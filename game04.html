<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ENIGMA DICE</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg0: #08080f; --bg1: #0d0d18; --bg2: #13131f; --bg3: #1a1428;
    --purple: #6c5ce7; --purple-light: #9d86f5; --purple-pale: #c9b8ff;
    --purple-dim: rgba(108,92,231,0.15);
    --border: #252535; --border2: #3a2f6a;
    --text: #d0cce8; --text-muted: #888; --text-dim: #444;
    --yellow: #f0c040; --green: #4cd97b; --red: #ff6b6b;
  }
  html, body { height: 100%; font-family: 'Segoe UI','Hiragino Sans','Meiryo',sans-serif; background: var(--bg0); color: var(--text); overflow-x: hidden; }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  /* HEADER */
  .header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:0.5px solid var(--border); background:rgba(8,8,15,0.9); backdrop-filter:blur(12px); position:sticky; top:0; z-index:50; flex-shrink:0; }
  .header-logo { font-size:13px; letter-spacing:4px; color:var(--purple-pale); font-weight:600; }
  .header-right { display:flex; align-items:center; gap:16px; }
  .level-badge { font-size:10px; letter-spacing:2px; color:var(--purple-light); background:var(--purple-dim); border:0.5px solid var(--border2); border-radius:4px; padding:4px 10px; }
  .score-display { font-size:13px; font-weight:600; color:var(--yellow); letter-spacing:1px; font-variant-numeric:tabular-nums; }

  /* LAYOUT */
  .game-wrap { flex:1; display:flex; flex-direction:column; align-items:center; padding:20px 16px 32px; }
  @media(min-width:768px) {
    .game-wrap { flex-direction:row; align-items:flex-start; justify-content:center; gap:24px; padding:32px 40px; max-width:1100px; margin:0 auto; width:100%; }
  }
  .panel-left { width:100%; display:flex; flex-direction:column; gap:16px; }
  @media(min-width:768px) { .panel-left { width:340px; flex-shrink:0; } }
  .panel-right { width:100%; display:flex; flex-direction:column; gap:16px; margin-top:16px; }
  @media(min-width:768px) { .panel-right { flex:1; margin-top:0; max-width:480px; } }

  /* CARD */
  .card { background:var(--bg1); border:0.5px solid var(--border); border-radius:12px; padding:16px 18px; }
  .card-label { font-size:9px; letter-spacing:3px; color:var(--purple); margin-bottom:10px; }

  /* TARGET */
  .target-row { display:flex; align-items:baseline; gap:10px; }
  .target-number { font-size:52px; font-weight:700; color:var(--purple-pale); line-height:1; letter-spacing:-2px; font-variant-numeric:tabular-nums; }
  .target-unit { font-size:11px; color:var(--text-muted); letter-spacing:2px; }

  /* TIMER */
  .timer-wrap { margin-top:12px; }
  .timer-bar-bg { height:4px; background:var(--border); border-radius:99px; overflow:hidden; margin-bottom:6px; }
  .timer-bar-fill { height:100%; border-radius:99px; background:var(--purple-light); transition:width 1s linear, background 0.5s; }
  .timer-bar-fill.warn { background:var(--yellow); }
  .timer-bar-fill.danger { background:var(--red); }
  .timer-text { font-size:12px; color:var(--text-muted); letter-spacing:1px; font-variant-numeric:tabular-nums; }

  /* PROGRESS */
  .progress-dots { display:flex; gap:6px; margin-top:12px; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--border); transition:background 0.3s; }
  .dot.done { background:var(--purple); }
  .dot.current { background:var(--purple-pale); box-shadow:0 0 6px var(--purple); }

  /* DICE */
  .dice-grid { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .die { width:64px; height:64px; border-radius:12px; background:var(--bg2); border:1.5px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:700; color:var(--purple-pale); cursor:pointer; transition:border-color 0.15s, background 0.15s, transform 0.1s; user-select:none; font-variant-numeric:tabular-nums; }
  .die:hover { border-color:var(--purple-light); background:var(--bg3); }
  .die:active { transform:scale(0.94); }
  .die.used { opacity:0.28; cursor:not-allowed; border-color:var(--border); color:var(--text-dim); pointer-events:none; }
  .hint-text { font-size:11px; color:var(--text-dim); letter-spacing:0.5px; line-height:1.5; margin-top:12px; }

  /* FORMULA */
  .formula-display { min-height:64px; background:var(--bg0); border:0.5px solid var(--border2); border-radius:10px; padding:12px 16px; display:flex; align-items:center; flex-wrap:wrap; gap:6px; }
  .formula-token { font-size:22px; font-weight:600; color:var(--purple-pale); font-variant-numeric:tabular-nums; padding:2px 6px; border-radius:6px; background:var(--purple-dim); border:0.5px solid var(--border2); }
  .formula-token.op { color:var(--yellow); background:rgba(240,192,64,0.1); border-color:rgba(240,192,64,0.25); font-size:18px; }
  .formula-token.paren { color:var(--text-muted); background:transparent; border-color:transparent; font-size:22px; }
  .formula-cursor { width:2px; height:28px; background:var(--purple-light); border-radius:1px; animation:blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
  .formula-result { font-size:13px; letter-spacing:1px; padding:6px 12px; border-radius:8px; margin-top:6px; text-align:center; font-variant-numeric:tabular-nums; }
  .formula-result.neutral { color:var(--text-muted); }
  .formula-result.correct { color:var(--green); background:rgba(76,217,123,0.1); border:0.5px solid rgba(76,217,123,0.3); }
  .formula-result.wrong   { color:var(--red);   background:rgba(255,107,107,0.1); border:0.5px solid rgba(255,107,107,0.3); }

  /* OPERATORS */
  .ops-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .op-btn { padding:14px 0; border-radius:8px; background:var(--bg2); border:0.5px solid var(--border); color:var(--yellow); font-size:20px; font-weight:600; cursor:pointer; transition:background 0.15s, border-color 0.15s, transform 0.1s; user-select:none; font-family:inherit; }
  .op-btn:hover { background:var(--bg3); border-color:rgba(240,192,64,0.4); }
  .op-btn:active { transform:scale(0.94); }
  .op-btn.paren-btn { color:var(--text-muted); font-size:16px; }

  /* BUTTONS */
  .action-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .btn { padding:13px; border-radius:8px; font-size:12px; letter-spacing:2px; cursor:pointer; border:none; font-family:inherit; transition:opacity 0.15s, transform 0.1s; user-select:none; width:100%; margin-top:8px; }
  .btn:active { transform:scale(0.97); }
  .btn-back  { background:var(--bg2); color:var(--text-muted); border:0.5px solid var(--border); }
  .btn-clear { background:var(--bg2); color:var(--red); border:0.5px solid rgba(255,107,107,0.25); }
  .btn-submit { background:var(--purple); color:#fff; }
  .btn-submit:hover { background:#7d6ef0; }
  .btn-submit:disabled { opacity:0.4; cursor:not-allowed; }

  /* SCREENS */
  .screen { display:none; position:fixed; inset:0; background:rgba(8,8,15,0.93); backdrop-filter:blur(16px); z-index:200; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:32px; gap:0; }
  .screen.show { display:flex; }
  .screen-icon { font-size:52px; margin-bottom:14px; }
  .screen-title { font-size:22px; font-weight:700; color:var(--purple-pale); letter-spacing:3px; margin-bottom:8px; }
  .screen-sub { font-size:13px; color:var(--text-muted); line-height:1.7; margin-bottom:20px; }
  .screen-score { font-size:42px; font-weight:700; color:var(--yellow); margin-bottom:4px; font-variant-numeric:tabular-nums; }
  .screen-score-label { font-size:10px; letter-spacing:3px; color:var(--text-muted); margin-bottom:8px; }
  .screen-hi { font-size:12px; color:var(--purple-light); margin-bottom:20px; letter-spacing:1px; }
  .answer-box { margin-bottom:20px; padding:12px 20px; background:rgba(108,92,231,0.12); border:0.5px solid var(--border2); border-radius:10px; font-size:13px; color:var(--purple-pale); line-height:1.9; display:none; max-width:320px; }
  .answer-label { font-size:10px; letter-spacing:2px; color:var(--purple-light); margin-bottom:4px; }
  .screen-btn { padding:14px 40px; border-radius:8px; font-size:12px; letter-spacing:2px; cursor:pointer; border:none; font-family:inherit; background:var(--purple); color:#fff; }
  .screen-btn:hover { background:#7d6ef0; }

  /* FLASH */
  .clear-flash { position:fixed; inset:0; background:rgba(108,92,231,0.12); pointer-events:none; opacity:0; z-index:100; transition:opacity 0.3s; }
  .clear-flash.show { opacity:1; }

  /* TOAST */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--bg2); border:0.5px solid var(--border2); border-radius:8px; padding:10px 20px; font-size:13px; color:var(--purple-pale); z-index:300; transition:transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s; opacity:0; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">ENIGMA DICE</div>
  <div class="header-right">
    <div class="level-badge" id="levelBadge">LEVEL 1</div>
    <div class="score-display" id="scoreDisplay">0</div>
  </div>
</div>

<div class="game-wrap">
  <div class="panel-left">
    <div class="card">
      <div class="card-label">— TARGET</div>
      <div class="target-row">
        <div class="target-number" id="targetNum">—</div>
        <div class="target-unit">を作れ</div>
      </div>
      <div class="timer-wrap">
        <div class="timer-bar-bg"><div class="timer-bar-fill" id="timerBar" style="width:100%"></div></div>
        <div class="timer-text" id="timerText">— 秒</div>
      </div>
      <div class="progress-dots" id="progressDots"></div>
    </div>
    <div class="card">
      <div class="card-label">— DICE　<span style="font-size:9px;color:var(--text-dim);">タップして使う</span></div>
      <div class="dice-grid" id="diceGrid"></div>
      <div class="hint-text" id="hintText">ダイスをタップして数式に追加しよう</div>
    </div>
  </div>

  <div class="panel-right">
    <div class="card">
      <div class="card-label">— FORMULA</div>
      <div class="formula-display" id="formulaDisplay"><div class="formula-cursor"></div></div>
      <div class="formula-result neutral" id="formulaResult">数式を入力してね</div>
    </div>
    <div class="card">
      <div class="card-label">— OPERATORS</div>
      <div class="ops-grid" id="opsGrid">
        <button class="op-btn" data-op="+">＋</button>
        <button class="op-btn" data-op="-">－</button>
        <button class="op-btn" data-op="*">×</button>
        <button class="op-btn" data-op="/">÷</button>
        <button class="op-btn paren-btn" data-op="(" id="parenOpen">(</button>
        <button class="op-btn paren-btn" data-op=")" id="parenClose">)</button>
      </div>
    </div>
    <div class="card">
      <div class="action-row">
        <button class="btn btn-back" id="btnBack" style="margin-top:0;">← もどす</button>
        <button class="btn btn-clear" id="btnClear" style="margin-top:0;">クリア</button>
      </div>
      <button class="btn btn-submit" id="btnSubmit" disabled>答え合わせ ▶</button>
    </div>
  </div>
</div>

<!-- SCREENS -->
<div class="screen" id="screenStart">
  <div class="screen-icon">🎲</div>
  <div class="screen-title">ENIGMA DICE</div>
  <div class="screen-sub">ダイスの出目を<br>数式に組み立てて<br>ターゲットを作れ</div>
  <button class="screen-btn" id="btnStart">はじめる</button>
  <div style="margin-top:16px;font-size:11px;color:var(--text-dim);letter-spacing:1px;" id="hiScoreStart"></div>
</div>

<div class="screen" id="screenClear">
  <div class="screen-icon" id="clearIcon">✨</div>
  <div class="screen-title" id="clearTitle">CLEAR!</div>
  <div class="screen-sub" id="clearSub"></div>
  <button class="screen-btn" id="btnNextQ">次の問題へ ▶</button>
</div>

<div class="screen" id="screenTimeout">
  <div class="screen-icon">⏰</div>
  <div class="screen-title">TIME UP</div>
  <div class="screen-sub">惜しかった！もう一度挑戦しよう</div>
  <div class="answer-box" id="timeoutAnswer">
    <div class="answer-label">— 正解例 —</div>
    <div id="timeoutAnswerText"></div>
  </div>
  <button class="screen-btn" id="btnRetry">もう一度</button>
</div>

<div class="screen" id="screenGameover">
  <div class="screen-icon">🌌</div>
  <div class="screen-title">GAME OVER</div>
  <div class="screen-score" id="goScore">0</div>
  <div class="screen-score-label">TOTAL SCORE</div>
  <div class="screen-hi" id="goHi"></div>
  <div class="answer-box" id="gameoverAnswer">
    <div class="answer-label">— 最後の問題の正解例 —</div>
    <div id="gameoverAnswerText"></div>
  </div>
  <button class="screen-btn" id="btnRestart">もう一度あそぶ</button>
</div>

<div class="clear-flash" id="clearFlash"></div>
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────
const LEVELS = [
  null,
  { diceCount:2, diceFaces:6, ops:['+','-'],         targetMin:2,  targetMax:12,  time:60 },
  { diceCount:2, diceFaces:6, ops:['+','-'],         targetMin:2,  targetMax:12,  time:60 },
  { diceCount:2, diceFaces:6, ops:['+','-'],         targetMin:2,  targetMax:12,  time:60 },
  { diceCount:3, diceFaces:6, ops:['+','-','*','/'], targetMin:2,  targetMax:30,  time:75 },
  { diceCount:3, diceFaces:6, ops:['+','-','*','/'], targetMin:2,  targetMax:30,  time:75 },
  { diceCount:3, diceFaces:6, ops:['+','-','*','/'], targetMin:2,  targetMax:30,  time:75 },
  { diceCount:4, diceFaces:6, ops:['+','-','*','/'], targetMin:2,  targetMax:50,  time:90 },
  { diceCount:4, diceFaces:6, ops:['+','-','*','/'], targetMin:2,  targetMax:50,  time:90 },
  { diceCount:4, diceFaces:6, ops:['+','-','*','/'], targetMin:2,  targetMax:50,  time:90 },
  { diceCount:4, diceFaces:8, ops:['+','-','*','/','('], targetMin:2, targetMax:100, time:90 },
];
function cfg(lv) { return LEVELS[Math.min(lv, 10)] || LEVELS[10]; }

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let level = 1;
let qInLevel = 0;
let score = 0;
let hiScore = parseInt(localStorage.getItem('enigma_hi') || '0');
let diceValues = [];
let diceUsed = [];
let formula = [];
let timerID = null;
let timeLeft = 60;
let totalTime = 60;
let gameActive = false;
let timeoutCount = 0;
let target = 0;

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
const $ = id => document.getElementById(id);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  if (id) $(id).classList.add('show');
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ─────────────────────────────────────────
// SOLVER — 到達可能な全整数を列挙
// ─────────────────────────────────────────
function allPerms(arr) {
  if (arr.length <= 1) return [arr.slice()];
  const out = [];
  arr.forEach((_, i) => {
    const rest = arr.filter((__, j) => j !== i);
    allPerms(rest).forEach(p => out.push([arr[i], ...p]));
  });
  return out;
}

function combine(vals, useDiv) {
  if (vals.length === 1) return [vals[0]];
  const ops = useDiv ? ['+','-','*','/'] : ['+','-'];
  const out = [];
  for (let i = 1; i < vals.length; i++) {
    const lefts  = combine(vals.slice(0, i), useDiv);
    const rights = combine(vals.slice(i),    useDiv);
    for (const l of lefts) for (const r of rights) for (const op of ops) {
      if (op === '+') out.push(l + r);
      if (op === '-') out.push(l - r);
      if (op === '*') out.push(l * r);
      if (op === '/' && r !== 0) out.push(l / r);
    }
  }
  return out;
}

function reachableIntegers(nums, useDiv) {
  const set = new Set();
  for (const perm of allPerms(nums)) {
    for (const v of combine(perm, useDiv)) {
      if (Number.isFinite(v) && Number.isInteger(v) && v > 0) set.add(v);
    }
  }
  return set;
}

// ─────────────────────────────────────────
// SOLVER — 正解式を1つ返す
// ─────────────────────────────────────────
const OPSTR = {'+':'＋', '-':'－', '*':'×', '/':'÷'};

function combineExpr(items, useDiv) {
  if (items.length === 1) return [{val: items[0].v, expr: String(items[0].v)}];
  const ops = useDiv ? ['+','-','*','/'] : ['+','-'];
  const out = [];
  for (let i = 1; i < items.length; i++) {
    const lefts  = combineExpr(items.slice(0, i), useDiv);
    const rights = combineExpr(items.slice(i),    useDiv);
    for (const l of lefts) for (const r of rights) for (const op of ops) {
      let val = null;
      if (op === '+') val = l.val + r.val;
      if (op === '-') val = l.val - r.val;
      if (op === '*') val = l.val * r.val;
      if (op === '/' && r.val !== 0) val = l.val / r.val;
      if (val === null || !Number.isFinite(val)) continue;
      const needL = (op==='*'||op==='/') && /[＋－]/.test(l.expr);
      const needR = ((op==='*'||op==='/') && /[＋－]/.test(r.expr)) || (op==='-' && /[＋－]/.test(r.expr));
      const le = needL ? `(${l.expr})` : l.expr;
      const re = needR ? `(${r.expr})` : r.expr;
      out.push({val, expr: `${le} ${OPSTR[op]} ${re}`});
    }
  }
  return out;
}

function findSolution(nums, tgt, useDiv) {
  for (const perm of allPerms(nums.map((v,i) => ({v,i})))) {
    for (const {val, expr} of combineExpr(perm, useDiv)) {
      if (Math.abs(val - tgt) < 1e-9 && Number.isInteger(Math.round(val))) return expr;
    }
  }
  return null;
}

function showAnswer(textElId, boxElId) {
  const useDiv = cfg(level).ops.includes('/');
  const sol = findSolution(diceValues, target, useDiv);
  const textEl = $(textElId);
  const boxEl  = $(boxElId);
  if (sol) {
    textEl.textContent = `${sol} ＝ ${target}`;
    boxEl.style.display = 'block';
  } else {
    boxEl.style.display = 'none';
  }
}

// ─────────────────────────────────────────
// DICE
// ─────────────────────────────────────────
function rollDice() {
  const c = cfg(level);
  diceValues = Array.from({length: c.diceCount}, () => Math.floor(Math.random() * c.diceFaces) + 1);
  diceUsed   = Array(c.diceCount).fill(false);
  renderDice();
}

function renderDice() {
  const grid = $('diceGrid');
  grid.innerHTML = '';
  diceValues.forEach((v, i) => {
    const die = document.createElement('div');
    die.className = 'die' + (diceUsed[i] ? ' used' : '');
    die.textContent = v;
    die.addEventListener('click', () => {
      if (!gameActive || diceUsed[i]) return;
      diceUsed[i] = true;
      formula.push({type:'num', value: v, diceIdx: i});
      renderDice();
      renderFormula();
      updateHint();
    });
    grid.appendChild(die);
  });
}

// ─────────────────────────────────────────
// FORMULA
// ─────────────────────────────────────────
function renderFormula() {
  const display = $('formulaDisplay');
  display.innerHTML = '';
  formula.forEach(tok => {
    const span = document.createElement('span');
    if (tok.type === 'num') {
      span.className = 'formula-token';
      span.textContent = tok.value;
    } else if (tok.type === 'op') {
      span.className = 'formula-token op';
      span.textContent = OPSTR[tok.value] || tok.value;
    } else {
      span.className = 'formula-token paren';
      span.textContent = tok.value;
    }
    display.appendChild(span);
  });
  const cursor = document.createElement('div');
  cursor.className = 'formula-cursor';
  display.appendChild(cursor);
  evalFormula();
}

function safeEval(expr) {
  if (!expr || !/^[\d\s\+\-\*\/\(\)\.]+$/.test(expr)) return null;
  try { return Function('"use strict";return(' + expr + ')')(); } catch(e) { return null; }
}

function evalFormula() {
  const resultEl = $('formulaResult');
  const expr = formula.map(t => t.value).join(' ');
  if (!expr) {
    resultEl.className = 'formula-result neutral';
    resultEl.textContent = '数式を入力してね';
    $('btnSubmit').disabled = true;
    return;
  }
  const val = safeEval(expr);
  const allUsed = diceUsed.every(u => u);
  if (val === null || !Number.isFinite(val)) {
    resultEl.className = 'formula-result neutral';
    resultEl.textContent = '式が途中だよ';
    $('btnSubmit').disabled = true;
    return;
  }
  const rounded = Math.round(val * 1000) / 1000;
  if (rounded === target && allUsed) {
    resultEl.className = 'formula-result correct';
    resultEl.textContent = `＝ ${rounded}　✓ 正解！`;
    $('btnSubmit').disabled = false;
  } else if (rounded === target && !allUsed) {
    resultEl.className = 'formula-result wrong';
    resultEl.textContent = `＝ ${rounded}　ダイスを全部使ってね`;
    $('btnSubmit').disabled = true;
  } else {
    resultEl.className = 'formula-result wrong';
    resultEl.textContent = `＝ ${rounded}　（目標: ${target}）`;
    $('btnSubmit').disabled = true;
  }
}

// ─────────────────────────────────────────
// OPERATORS
// ─────────────────────────────────────────
document.querySelectorAll('.op-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!gameActive) return;
    const op = btn.dataset.op;
    formula.push(op === '(' || op === ')' ? {type:'paren', value:op} : {type:'op', value:op});
    renderFormula();
    updateHint();
  });
});

$('btnBack').addEventListener('click', () => {
  if (!gameActive || !formula.length) return;
  const removed = formula.pop();
  if (removed.type === 'num' && removed.diceIdx !== undefined) {
    diceUsed[removed.diceIdx] = false;
    renderDice();
  }
  renderFormula();
  updateHint();
});

$('btnClear').addEventListener('click', () => {
  if (!gameActive) return;
  formula = [];
  diceUsed.fill(false);
  renderDice();
  renderFormula();
  updateHint();
});

// ─────────────────────────────────────────
// SUBMIT
// ─────────────────────────────────────────
$('btnSubmit').addEventListener('click', () => {
  if (!gameActive) return;
  stopTimer();
  gameActive = false;
  const timeBonus  = Math.floor(timeLeft * 3);
  const levelBonus = level * 10;
  const gained = 100 + timeBonus + levelBonus;
  score += gained;
  updateScoreDisplay();
  const flash = $('clearFlash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 400);
  qInLevel++;
  $('clearIcon').textContent  = qInLevel >= 3 ? '🌟' : '✨';
  $('clearTitle').textContent = qInLevel >= 3 ? 'LEVEL UP!' : 'CLEAR!';
  $('clearSub').textContent   = `+${gained} pts（タイムボーナス +${timeBonus}）`;
  updateDots();
  showScreen('screenClear');
});

$('btnNextQ').addEventListener('click', () => {
  if (qInLevel >= 3) { level++; qInLevel = 0; showToast(`LEVEL ${level} スタート！`); }
  timeoutCount = 0;
  showScreen(null);
  startQuestion();
});

// ─────────────────────────────────────────
// TIMER
// ─────────────────────────────────────────
function stopTimer() {
  clearInterval(timerID);
  timerID = null;
}

function startTimer() {
  stopTimer();
  const c = cfg(level);
  totalTime = c.time;
  timeLeft  = totalTime;
  updateTimerUI();
  timerID = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      stopTimer();
      gameActive = false;
      onTimeout();
    }
  }, 1000);
}

function updateTimerUI() {
  const pct = timeLeft / totalTime * 100;
  const bar = $('timerBar');
  bar.style.width = pct + '%';
  bar.className = 'timer-bar-fill' + (pct < 25 ? ' danger' : pct < 50 ? ' warn' : '');
  $('timerText').textContent = `${timeLeft} 秒`;
}

function onTimeout() {
  timeoutCount++;
  showAnswer('timeoutAnswerText', 'timeoutAnswer');
  if (timeoutCount >= 3) {
    onGameOver();
    return;
  }
  showScreen('screenTimeout');
}

$('btnRetry').addEventListener('click', () => {
  showScreen(null);
  startQuestion();
});

// ─────────────────────────────────────────
// GAME OVER
// ─────────────────────────────────────────
function onGameOver() {
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('enigma_hi', hiScore);
  }
  $('goScore').textContent = score.toLocaleString();
  $('goHi').textContent    = `ハイスコア: ${hiScore.toLocaleString()}`;
  showAnswer('gameoverAnswerText', 'gameoverAnswer');
  showScreen('screenGameover');
}

$('btnRestart').addEventListener('click', () => {
  level = 1; qInLevel = 0; score = 0; timeoutCount = 0;
  updateScoreDisplay();
  showScreen(null);
  startQuestion();
});

// ─────────────────────────────────────────
// PROGRESS DOTS
// ─────────────────────────────────────────
function updateDots() {
  const dots = $('progressDots');
  dots.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < qInLevel ? ' done' : i === qInLevel ? ' current' : '');
    dots.appendChild(d);
  }
}

// ─────────────────────────────────────────
// HINT
// ─────────────────────────────────────────
function updateHint() {
  const allUsed = diceUsed.every(u => u);
  const last = formula[formula.length - 1];
  let hint = '';
  if (!formula.length)                               hint = 'ダイスをタップして数式に追加しよう';
  else if (!allUsed && last?.type === 'num')         hint = '演算子を選んでね（＋ － × ÷）';
  else if (!allUsed && last?.type === 'op')          hint = '次のダイスをタップしよう';
  else if (allUsed)                                  hint = 'ダイスを全部使ったよ！答え合わせしてみて';
  $('hintText').textContent = hint;
}

// ─────────────────────────────────────────
// TARGET — 必ず作れる数を選ぶ
// ─────────────────────────────────────────
function pickTarget() {
  const c = cfg(level);
  const useDiv = c.ops.includes('/');
  const reachable = reachableIntegers(diceValues, useDiv);
  const candidates = [...reachable].filter(v => v >= c.targetMin && v <= c.targetMax);
  let pool = candidates.length > 0 ? candidates : [...reachable];
  if (level >= 4 && pool.length > 4) {
    const sorted = pool.slice().sort((a,b) => a-b);
    pool = sorted.slice(Math.floor(sorted.length * 0.25));
  }
  target = pool[Math.floor(Math.random() * pool.length)] || diceValues[0];
  $('targetNum').textContent = target;
}

// ─────────────────────────────────────────
// START QUESTION
// ─────────────────────────────────────────
function startQuestion() {
  formula    = [];
  diceUsed   = [];
  gameActive = true;
  rollDice();
  pickTarget();
  renderFormula();
  updateDots();
  updateHint();
  // パーレンボタンの表示
  const hasParen = cfg(level).ops.includes('(');
  $('parenOpen').style.display  = hasParen ? '' : 'none';
  $('parenClose').style.display = hasParen ? '' : 'none';
  $('levelBadge').textContent   = `LEVEL ${level}`;
  startTimer();
}

// ─────────────────────────────────────────
// SCORE
// ─────────────────────────────────────────
function updateScoreDisplay() {
  $('scoreDisplay').textContent = score.toLocaleString();
}

// ─────────────────────────────────────────
// START SCREEN
// ─────────────────────────────────────────
$('btnStart').addEventListener('click', () => {
  level = 1; qInLevel = 0; score = 0; timeoutCount = 0;
  updateScoreDisplay();
  showScreen(null);
  startQuestion();
});

if (hiScore > 0) $('hiScoreStart').textContent = `ハイスコア: ${hiScore.toLocaleString()}`;
showScreen('screenStart');
</script>
</body>
</html>
