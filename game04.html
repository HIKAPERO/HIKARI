<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SWEET PAW PUZZLE</title>
<style>
  :root {
    --bg0: #fff5f7; /* ふわふわピンクの背景 */
    --bg1: #ffffff;
    --accent: #ff85a2; /* スクイーズピンク */
    --accent-light: #ffd1dc;
    --yellow: #ffde59;
    --text: #7d6b6b;
    --shadow: rgba(255, 133, 162, 0.2);
  }
  *, *::before, *::after { box-sizing: border-box; }
  body { 
    background: var(--bg0); color: var(--text); 
    font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
    margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }

  /* ぷっくりカードスタイル */
  .card { 
    background: var(--bg1); border-radius: 30px; 
    padding: 24px; margin: 10px; width: 90%; max-width: 400px;
    box-shadow: 0 10px 0 #ffd1dc; border: 4px solid var(--accent-light);
  }

  /* 肉球ダイス */
  .die {
    width: 70px; height: 70px; border-radius: 25px;
    background: #fff; border: 4px solid var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800; color: var(--accent);
    cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 6px 0 var(--accent-light);
  }
  .die:active { transform: scale(0.85) translateY(4px); }
  .die.used { opacity: 0.3; transform: scale(0.9); }

  /* ぷっくりボタン */
  .btn {
    background: var(--accent); color: white; border: none;
    padding: 15px; border-radius: 20px; font-weight: bold;
    width: 100%; cursor: pointer; transition: 0.2s;
    box-shadow: 0 6px 0 #d96d88;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d96d88; }
  
  .game-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  .dice-grid { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
  
  .target-display { font-size: 48px; font-weight: 900; color: var(--accent); text-align: center; }
  .screen { display:none; position:fixed; inset:0; background:rgba(255,245,247,0.95); z-index:100; align-items:center; justify-content:center; }
  .screen.show { display:flex; flex-direction:column; }
</style>
</head>
<body>

<div class="game-wrap">
  <div class="card">
    <div style="font-size:12px; letter-spacing:2px; color:var(--accent);">— TARGET SWEET —</div>
    <div class="target-display" id="targetNum">--</div>
  </div>

  <div class="card">
    <div class="dice-grid" id="diceGrid"></div>
  </div>

  <div class="card">
    <button class="btn" id="btnSubmit">ぷにっと答え合わせ！</button>
  </div>
</div>

<script>
  // 簡単なロジック
  let diceValues = [1, 2, 3];
  const grid = document.getElementById('diceGrid');
  
  function render() {
    grid.innerHTML = '';
    diceValues.forEach(v => {
      const d = document.createElement('div');
      d.className = 'die';
      d.textContent = v;
      d.onclick = () => alert('ぷにっ！');
      grid.appendChild(d);
    });
  }
  
  render();
</script>
</body>
</html>
