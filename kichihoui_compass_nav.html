<!DOCTYPE html>
<meta charset="UTF-8">
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">GPSと方位コンパスで吉方位を可視化するナビゲーション。現在地を取得し最強方位を矢印で示す。</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{max-width:380px;margin:0 auto;padding:1rem 0}
h3{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:.6rem}
.fld{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.fld label{font-size:12px;color:var(--color-text-secondary)}
.fld input{font-size:13px;padding:7px 9px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.btn{font-size:13px;padding:9px 18px;border:0.5px solid var(--color-border-secondary);border-radius:20px;background:transparent;color:var(--color-text-secondary);cursor:pointer;width:100%}
.btn.p{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.btn.gps{background:#E6F1FB;color:#185FA5;border-color:transparent;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px}
.hint{font-size:11px;color:var(--color-text-tertiary);line-height:1.6;margin-top:6px}
.status{font-size:11px;padding:8px 10px;border-radius:var(--border-radius-md);margin-bottom:8px;line-height:1.5}
.status.ok{background:#E1F5EE;color:#0F6E56}
.status.err{background:#FAEEDA;color:#854F0B}
.status.info{background:#E6F1FB;color:#185FA5}
.tab-row{display:flex;gap:5px;margin:12px 0 .7rem;flex-wrap:wrap}
.tab{font-size:11px;padding:4px 11px;border:0.5px solid var(--color-border-secondary);border-radius:20px;background:transparent;color:var(--color-text-secondary);cursor:pointer}
.tab.active{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.best-card{background:#E1F5EE;border-radius:var(--border-radius-lg);padding:14px;margin-bottom:12px}
.bc-label{font-size:11px;color:#0F6E56;font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.bc-main{display:flex;align-items:center;gap:12px}
.bc-dir{font-size:30px;font-weight:500;color:var(--color-text-primary)}
.bc-deg{font-size:13px;color:#0F6E56}
.compass-wrap{display:flex;justify-content:center;margin-bottom:12px}
.nav-msg{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;font-size:13px;color:var(--color-text-primary);line-height:1.8;margin-bottom:10px}
.nav-msg b{color:#0F6E56}
.coords-line{font-size:11px;color:var(--color-text-secondary);text-align:center;margin-bottom:10px;line-height:1.6}
.legend{display:flex;gap:12px;justify-content:center;font-size:11px;color:var(--color-text-secondary);margin-bottom:10px}
.lg-item{display:flex;align-items:center;gap:4px}
.lg-dot{width:10px;height:10px;border-radius:50%}
</style>

<div class="wrap" id="root"></div>

<script>
/* ===== 方位 → 角度（北=0°, 時計回り）。九宮8方位に対応 ===== */
var DIR_TO_DEG={'北':0,'北東':45,'東':90,'東南':135,'南東':135,'南':180,'南西':225,'西南':225,'西':270,'西北':315,'北西':315};

/* ===== 既存ロジックの簡略版（最強方位抽出のみ・実機では既存をそのまま使用）===== */
var TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'],DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
var PALACES=[4,9,2,3,5,7,8,1,6],DIR=['東南','南','西南','東','中','西','東北','北','西北'],TRI=['巽','離','坤','震','中','兌','艮','坎','乾'];
var PAL_GOGYO={1:'水',2:'土',3:'木',4:'木',5:'土',6:'金',7:'金',8:'土',9:'火'};
var STARS=['天蓬','天芮','天冲','天輔','天禽','天心','天柱','天任','天英'],GATES=['休門','死門','傷門','杜門','中','開門','驚門','生門','景門'],DEITIES=['値符','螣蛇','太陰','六合','白虎','玄武','九地','九天','勾陳'];
var GND_STEM_BY_PAL={1:4,2:5,3:6,4:7,5:8,6:9,7:3,8:2,9:1};
var SL={'天蓬':1,'天芮':-1,'天冲':1,'天輔':1,'天禽':0,'天心':1,'天柱':-1,'天任':1,'天英':0};
var GL={'休門':1,'死門':-1,'傷門':-1,'杜門':0,'中':0,'開門':1,'驚門':-1,'生門':1,'景門':0};
var DL={'値符':1,'螣蛇':-1,'太陰':1,'六合':1,'白虎':-1,'玄武':-1,'九地':1,'九天':1,'勾陳':-1};
var DZ_TO_PAL={0:1,1:8,2:8,3:3,4:4,5:4,6:9,7:2,8:2,9:7,10:6,11:6};
var GOGYO={甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
var GEN_C={木:'火',火:'土',土:'金',金:'水',水:'木'},KOK_C={木:'土',火:'金',土:'水',金:'木',水:'火'};
var GEN_OF={木:'水',火:'木',土:'火',金:'土',水:'金'},KOK_OF={木:'金',火:'水',土:'木',金:'火',水:'土'};
var YYS={甲:1,乙:0,丙:1,丁:0,戊:1,己:0,庚:1,辛:0,壬:1,癸:0};
var HIDDEN_STEM={子:'癸',丑:'己',寅:'甲',卯:'乙',辰:'戊',巳:'丙',午:'丁',未:'己',申:'庚',酉:'辛',戌:'戊',亥:'壬'};

function dayGZi(d){var ep=new Date(2020,0,17),n=Math.floor((d-ep)/86400000);return{t:((n%10)+10)%10,b:((n%12)+12)%12};}
function getJunshu(d){var ep=new Date(2020,0,17),n60=((Math.floor((d-ep)/86400000)%60)+60)%60,tg=n60%10,dz=n60%12,js=((dz-tg)%12+12)%12;return{junshuDZIdx:js,ku1:(js+10)%12,ku2:(js+11)%12};}
function simpleBoard(date,tab){
  var off=((Math.floor((date-new Date(2020,0,17))/86400000))%9+9)%9;
  if(tab==='shi'){var hh=Math.floor(((date.getHours()+1)%24)/2);off=((off+hh)%9+9)%9;}
  var ji=getJunshu(date),kuP1=DZ_TO_PAL[ji.ku1],kuP2=DZ_TO_PAL[ji.ku2];
  var cells=PALACES.map(function(palNum,idx){
    var ep=palNum===5?2:palNum,sIdx=((ep-1+off)%9+9)%9,gIdx=sIdx,dIdx=((ep-1+off+2)%9+9)%9;
    var gsi=GND_STEM_BY_PAL[palNum],tsi=((gsi+off)%9+9)%9;
    var luck=(SL[STARS[sIdx]]||0)+(GL[GATES[gIdx]]||0)+(DL[DEITIES[dIdx]]||0);
    return{palNum:palNum,dir:DIR[idx],gogyo:PAL_GOGYO[palNum],star:STARS[sIdx],gate:palNum===5?'（寄）':GATES[gIdx],tenStem:TG[tsi],luck:luck,isKu:palNum===kuP1||palNum===kuP2,isCtr:palNum===5};
  });
  return cells;
}
function calcYojin(birth){
  var dStem=TG[dayGZi(birth).t],dGogyo=GOGYO[dStem];
  var sm=birth.getDate()>=18?birth.getMonth()+1:birth.getMonth();
  var stems=[TG[((birth.getFullYear()-4)%10+10)%10],TG[(([2,4,6,8,0][((birth.getFullYear()-4)%10+10)%10%5])+sm)%10],dStem],branches=[DZ[((birth.getFullYear()-4)%12+12)%12],DZ[(sm+2)%12],DZ[dayGZi(birth).b]];
  var score={木:0,火:0,土:0,金:0,水:0};
  stems.forEach(function(s){score[GOGYO[s]]+=1;});branches.forEach(function(b){score[GOGYO[HIDDEN_STEM[b]]]+=0.7;});
  var helpEl=[dGogyo,GEN_OF[dGogyo]],help=0,drain=0;for(var k in score){if(helpEl.indexOf(k)>=0)help+=score[k];else drain+=score[k];}
  var isStrong=help>=drain,yojinEl=isStrong?[KOK_OF[dGogyo],GEN_C[dGogyo]]:[GEN_OF[dGogyo],dGogyo];
  return{primaryYojin:yojinEl[0],yojinEl:yojinEl};
}
function extractBestDirection(birth,tab){
  var yojin=calcYojin(birth),cells=simpleBoard(new Date(),tab);
  cells.forEach(function(c){c.yojinDir=yojin.yojinEl.indexOf(c.gogyo)>=0;c.isSuper=c.luck>=2&&!c.isKu&&c.yojinDir;});
  var supers=cells.filter(function(c){return c.isSuper;}).sort(function(a,b){return b.luck-a.luck;});
  if(supers.length)return{dir:supers[0].dir,type:'super',cell:supers[0],yojin:yojin.primaryYojin};
  var lucky=cells.filter(function(c){return c.luck>=2&&!c.isKu&&!c.isCtr;}).sort(function(a,b){return b.luck-a.luck;});
  if(lucky.length)return{dir:lucky[0].dir,type:'kichi',cell:lucky[0],yojin:yojin.primaryYojin};
  var yd=cells.filter(function(c){return c.yojinDir&&!c.isCtr;});
  if(yd.length)return{dir:yd[0].dir,type:'yojin',cell:yd[0],yojin:yojin.primaryYojin};
  return null;
}

/* ===== 状態 ===== */
var APP={coords:null,birth:new Date('1990-05-15T10:30'),tab:'shi',gpsStatus:null};

function render(){
  var root=document.getElementById('root');
  var best=extractBestDirection(APP.birth,APP.tab);
  var html='<h3>吉方位ナビゲーション</h3>';

  // GPS取得ボタン
  html+='<button class="btn gps" onclick="getGPS()"><i class="ti ti-current-location" style="font-size:16px"></i>現在地を取得</button>';
  if(APP.gpsStatus){
    html+='<div class="status '+APP.gpsStatus.type+'">'+APP.gpsStatus.msg+'</div>';
  }
  // 座標手入力（フォールバック）
  html+='<div class="fld"><label>緯度・経度（手入力可・GPSで自動入力）</label><input type="text" id="coordsInput" value="'+(APP.coords?APP.coords.lat.toFixed(5)+', '+APP.coords.lng.toFixed(5):'')+'" placeholder="35.6895, 139.6917" oninput="onCoordsInput(this.value)"></div>';

  // 盤タブ
  html+='<div class="tab-row">';
  [['shi','時盤'],['ri','日盤']].forEach(function(t){html+='<button class="tab'+(APP.tab===t[0]?' active':'')+'" onclick="switchTab(\''+t[0]+'\')">'+t[1]+'</button>';});
  html+='</div>';

  if(best){
    var deg=DIR_TO_DEG[best.dir];
    html+='<div class="best-card"><div class="bc-label"><i class="ti ti-target" style="font-size:14px"></i>本日の最強吉方位</div><div class="bc-main"><span class="bc-dir">'+best.dir+'</span><span class="bc-deg">'+deg+'° ・ '+best.cell.star+'×'+best.cell.gate+'</span></div></div>';
    // コンパス
    html+='<div class="compass-wrap">'+drawCompass(best.dir,deg,APP.coords)+'</div>';
    html+='<div class="legend"><span class="lg-item"><span class="lg-dot" style="background:#185FA5"></span>現在地</span><span class="lg-item"><span class="lg-dot" style="background:#1D9E75"></span>吉方位（約3km先）</span></div>';
    // ナビメッセージ
    var destText='';
    if(APP.coords){var dest=computeOffset(APP.coords.lat,APP.coords.lng,3,deg);destText='目的地の座標は約 <b>'+dest.lat.toFixed(4)+', '+dest.lng.toFixed(4)+'</b> 付近です。';}
    html+='<div class="nav-msg">本日の最強吉方位：<b>'+best.dir+'</b>（'+deg+'°）<br>現在地から<b>'+best.dir+'方向へ約3km先</b>へ移動することで、奇門遁甲の良い気を取り込みやすいと考えられます。'+(destText?'<br>'+destText:'')+'</div>';
    if(APP.coords){html+='<div class="coords-line">現在地：'+APP.coords.lat.toFixed(5)+', '+APP.coords.lng.toFixed(5)+(APP.coords.fromGPS?'（GPS取得）':'（手入力）')+'</div>';}
    else{html+='<div class="status info">座標を取得または入力すると、目的地の座標も算出されます。コンパスは座標なしでも方位を表示します。</div>';}
  } else {
    html+='<div class="status info">本日は際立った吉方位がありません（安定した通常盤）。</div>';
  }

  html+='<div class="hint">方位→角度：北0°／北東45°／東90°／東南135°／南180°／南西225°／西270°／西北315°。computeOffset相当の球面計算で3km先を算出しています。</div>';
  root.innerHTML=html;
}

/* SVGコンパス描画 */
function drawCompass(dir,deg,coords){
  var cx=130,cy=130,r=100;
  var rad=(deg-90)*Math.PI/180; // 北を上(=-90°)に
  var ex=cx+r*0.78*Math.cos(rad),ey=cy+r*0.78*Math.sin(rad);
  var s='<svg viewBox="0 0 260 260" width="240" height="240" xmlns="http://www.w3.org/2000/svg">';
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="1"/>';
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(r*0.66)+'" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>';
  // 方位ラベル
  var labels=[['北',0],['北東',45],['東',90],['南東',135],['南',180],['南西',225],['西',270],['北西',315]];
  labels.forEach(function(L){
    var a=(L[1]-90)*Math.PI/180,lx=cx+(r+14)*Math.cos(a),ly=cy+(r+14)*Math.sin(a);
    var hot=(L[0]===dir||DIR_TO_DEG[L[0]]===deg);
    s+='<text x="'+lx+'" y="'+(ly+4)+'" text-anchor="middle" font-size="12" font-weight="'+(hot?'600':'400')+'" fill="'+(hot?'#0F6E56':'var(--color-text-secondary)')+'">'+L[0]+'</text>';
  });
  // 目盛
  for(var i=0;i<72;i++){var a=i*5*Math.PI/180,r1=r,r2=r-(i%2===0?8:4);s+='<line x1="'+(cx+r1*Math.cos(a))+'" y1="'+(cy+r1*Math.sin(a))+'" x2="'+(cx+r2*Math.cos(a))+'" y2="'+(cy+r2*Math.sin(a))+'" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>';}
  // 吉方位の矢印
  s+='<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1D9E75"/></marker></defs>';
  s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+ex+'" y2="'+ey+'" stroke="#1D9E75" stroke-width="3" marker-end="url(#arrow)"/>';
  // 吉方位地点マーカー（3km先）
  s+='<circle cx="'+ex+'" cy="'+ey+'" r="6" fill="#1D9E75"/>';
  s+='<text x="'+ex+'" y="'+(ey-10)+'" text-anchor="middle" font-size="10" fill="#0F6E56" font-weight="600">3km</text>';
  // 現在地（中心）
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="7" fill="#185FA5"/>';
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="12" fill="none" stroke="#185FA5" stroke-width="1" opacity="0.4"/>';
  s+='</svg>';
  return s;
}

/* computeOffset 相当（球面三角法で起点から距離・方位の地点を算出）*/
function computeOffset(lat,lng,distKm,bearingDeg){
  var R=6371,br=bearingDeg*Math.PI/180,la1=lat*Math.PI/180,lo1=lng*Math.PI/180,dr=distKm/R;
  var la2=Math.asin(Math.sin(la1)*Math.cos(dr)+Math.cos(la1)*Math.sin(dr)*Math.cos(br));
  var lo2=lo1+Math.atan2(Math.sin(br)*Math.sin(dr)*Math.cos(la1),Math.cos(dr)-Math.sin(la1)*Math.sin(la2));
  return{lat:la2*180/Math.PI,lng:lo2*180/Math.PI};
}

function getGPS(){
  APP.gpsStatus={type:'info',msg:'現在地を取得中...'};render();
  if(!navigator.geolocation){APP.gpsStatus={type:'err',msg:'この端末は位置情報に対応していません。座標を手入力してください。'};render();return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){APP.coords={lat:pos.coords.latitude,lng:pos.coords.longitude,fromGPS:true};APP.gpsStatus={type:'ok',msg:'現在地を取得しました。'};render();},
    function(err){
      var m='位置情報を取得できませんでした。';
      if(err.code===1)m='位置情報の利用が許可されませんでした。座標を手入力してください。';
      else if(err.code===2)m='現在地を特定できませんでした。座標を手入力してください。';
      else if(err.code===3)m='取得がタイムアウトしました。座標を手入力してください。';
      m+='（プレビュー環境ではGPSが使えないため、実機では正しく動作します）';
      APP.gpsStatus={type:'err',msg:m};render();
    },
    {enableHighAccuracy:true,timeout:8000,maximumAge:0}
  );
}
window.getGPS=getGPS;
function onCoordsInput(v){var m=v.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);if(m){APP.coords={lat:parseFloat(m[1]),lng:parseFloat(m[2]),fromGPS:false};render();}}
window.onCoordsInput=onCoordsInput;
function switchTab(t){APP.tab=t;render();}
window.switchTab=switchTab;
render();
</script>
