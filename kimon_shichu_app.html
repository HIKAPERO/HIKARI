<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>奇門遁甲 × 四柱推命 ｜ 運命ナビ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
  :root{
    --bg:#f4eee1; --surface:#fffdf8; --surface2:#ece3d1; --line:#e0d6bf; --line2:#d2c6aa;
    --text:#2b2620; --text2:#6e634f; --text3:#9c9078; --paper:#2b2620;
    --gold:#a9821f; --gold-soft:#b88a2e; --gold-dim:#8a7637; --shu:#c0432f;
    --green:#2f9070; --green-d:#2c7a5d; --green-bg:rgba(47,144,112,.12); --green-line:rgba(47,144,112,.40);
    --blue:#3f74ac; --blue-d:#2f5f95; --blue-bg:rgba(63,116,172,.12); --blue-line:rgba(63,116,172,.40);
    --red:#c0432f; --red-d:#a93824; --red-bg:rgba(192,67,47,.10); --red-line:rgba(192,67,47,.38);
    --amber:#9a7a1e; --amber-bg:rgba(169,130,31,.13); --purple:#8a5fa6;
    --r:14px; --r-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
  .app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:68px;position:relative}
  .header{padding:13px 16px;border-bottom:0.5px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:20;display:flex;align-items:center;justify-content:space-between}
  .header h1{font-size:16px;font-weight:600}
  .profile-chip{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 11px;background:var(--surface2);border-radius:20px;cursor:pointer;color:var(--text2);border:none;font-family:inherit}
  main{padding:14px}
  .screen{display:none}.screen.active{display:block}
  .card{background:var(--surface);border:0.5px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px}
  .sec-label{font-size:12px;font-weight:600;color:var(--text);margin:16px 0 8px;display:flex;align-items:center;gap:6px;padding-top:14px;border-top:0.5px solid var(--line)}
  .sec-label:first-child{padding-top:0;border-top:none;margin-top:0}
  .sec-label .si{font-size:15px}
  .fld{margin-bottom:10px}
  label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
  input,select{width:100%;font-size:14px;padding:9px 11px;border:0.5px solid var(--line2);border-radius:var(--r-sm);background:var(--surface);color:var(--text);font-family:inherit}
  input:disabled{opacity:.45}
  textarea{width:100%;font-size:13px;padding:9px 11px;border:0.5px solid var(--line2);border-radius:var(--r-sm);background:var(--surface);color:var(--text);font-family:inherit;resize:vertical;min-height:54px;line-height:1.6}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn{font-size:14px;padding:11px 18px;border:0.5px solid var(--line2);border-radius:24px;background:transparent;color:var(--text2);cursor:pointer;width:100%;font-family:inherit}
  .btn:active{transform:scale(.99)}
  .btn-primary{background:var(--blue);color:#fff;border-color:transparent;font-weight:600}
  .btn-green{background:var(--green);color:#fff;border-color:transparent;font-weight:600}
  .check-row{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--surface2);border-radius:var(--r-sm);margin-bottom:10px;cursor:pointer}
  .check-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:13px}
  .check-box.on{background:var(--green);border-color:var(--green)}
  .check-label{font-size:13px}.check-sub{font-size:11px;color:var(--text2)}
  .hint{font-size:12px;color:var(--text3);line-height:1.7;margin-top:8px}
  .empty{background:var(--surface2);border-radius:var(--r-sm);padding:24px 16px;text-align:center;color:var(--text2);font-size:13px;line-height:1.7}
  .empty .ei{font-size:26px;display:block;margin-bottom:8px}
  .hero-head{font-size:12px;color:var(--text2);margin-bottom:8px}
  .hero-main{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
  .hero-gz{font-size:25px;font-weight:600}.hero-gz .no{font-size:13px;font-weight:400;color:var(--text2)}
  .pill{font-size:11px;padding:3px 12px;border-radius:12px;font-weight:600;margin-left:auto}
  .pill-good{background:var(--green-bg);color:var(--green-d)}.pill-mid{background:var(--amber-bg);color:var(--amber)}
  .hero-desc{font-size:12px;color:var(--text2)}
  .yojin-card{background:var(--green-bg);border:0.5px solid var(--green-line);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
  .yj-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:#fff;flex-shrink:0}
  .yj-text{font-size:12px;line-height:1.5}.yj-text b{color:var(--green-d);font-weight:600}.yj-text .small{font-size:11px;color:var(--text2)}
  .dir-card{background:var(--blue-bg);border:0.5px solid var(--blue-line);border-radius:var(--r);padding:14px;margin-bottom:10px}
  .dir-head{font-size:12px;color:var(--blue);margin-bottom:7px}
  .dir-main{font-size:24px;font-weight:600;color:var(--blue-d);margin-bottom:5px}
  .dir-desc{font-size:12px;color:var(--blue);line-height:1.6}
  .triad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .triad-item{background:var(--surface);border:0.5px solid var(--line);border-radius:var(--r-sm);padding:11px 6px;text-align:center;cursor:pointer}
  .tr-label{font-size:10px;color:var(--text2);margin-bottom:4px}.tr-val{font-size:15px;font-weight:600;line-height:1.2}.tr-sub{font-size:9px;color:var(--text3);margin-top:3px}
  .link-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--surface);border:0.5px solid var(--line);border-radius:var(--r-sm);margin-bottom:7px;cursor:pointer}
  .lr-left{display:flex;align-items:center;gap:9px}.lr-icon{font-size:16px}.lr-title{font-size:13px}
  .lr-right{display:flex;align-items:center;gap:7px}.lr-meta{font-size:11px;color:var(--text2)}.lr-chev{color:var(--text3)}
  .meishiki-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px}
  .ms-col{background:var(--surface2);border-radius:var(--r-sm);overflow:hidden;text-align:center}
  .ms-col.nichi{background:var(--green-bg)}
  .ms-col.empty-col{background:repeating-linear-gradient(45deg,var(--surface2),var(--surface2) 6px,transparent 6px,transparent 12px)}
  .ms-head{font-size:10px;color:var(--text2);padding:5px 2px;background:rgba(0,0,0,0.03)}
  .ms-col.nichi .ms-head{color:var(--green-d)}
  .ms-kan{font-size:22px;font-weight:600;padding:9px 2px 3px;line-height:1}
  .ms-ji{font-size:22px;font-weight:600;padding:0 2px 7px;line-height:1}
  .ms-empty{font-size:11px;color:var(--text3);padding:14px 2px;line-height:1.4}
  .ms-tsu{font-size:10px;color:var(--text2);padding:4px 2px;background:rgba(0,0,0,0.03)}
  .gogyo-row{display:grid;grid-template-columns:26px 1fr 54px;align-items:center;gap:8px;margin-bottom:6px}
  .gogyo-name{font-size:12px;color:var(--text2)}
  .gogyo-bar-bg{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden}
  .gogyo-bar-fill{height:100%;border-radius:99px}
  .gogyo-val{font-size:11px;color:var(--text2);text-align:right}
  .kj-card{background:var(--surface2);border-radius:var(--r);padding:14px;margin-bottom:10px}
  .kj-balance{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .kj-side{flex:1;text-align:center}.kj-side-label{font-size:10px;color:var(--text2);margin-bottom:3px}.kj-side-val{font-size:18px;font-weight:600}
  .kj-vs{font-size:12px;color:var(--text3)}
  .kj-bar{display:flex;height:10px;border-radius:99px;overflow:hidden;margin-bottom:8px}
  .kj-bar-l{background:var(--green)}.kj-bar-r{background:#ef9f27}
  .kj-verdict{display:flex;align-items:center;gap:8px;justify-content:center}
  .kj-badge{font-size:14px;font-weight:600;padding:4px 16px;border-radius:20px}
  .kj-strong{background:var(--green-bg);color:var(--green-d)}.kj-weak{background:var(--amber-bg);color:var(--amber)}
  .yojin-hero{border:0.5px solid var(--green);background:var(--green-bg);border-radius:var(--r);padding:15px;margin-bottom:10px}
  .yh-label{font-size:11px;color:var(--green-d);font-weight:600;margin-bottom:8px}
  .yh-main{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .yh-element{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:23px;font-weight:600;color:#fff}
  .yh-element-name{font-size:17px;font-weight:600}.yh-element-sub{font-size:12px;color:var(--text2)}
  .yh-text{font-size:13px;line-height:1.8}
  .yh-basis{font-size:11px;color:var(--text2);margin-top:9px;padding-top:9px;border-top:0.5px solid var(--green-line);line-height:1.6}
  .reading-tabs{display:flex;gap:5px;flex-wrap:wrap;margin:14px 0 10px}
  .rtab{font-size:12px;padding:5px 13px;border:0.5px solid var(--line2);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
  .rtab.active{background:var(--blue-bg);color:var(--blue);border-color:transparent;font-weight:600}
  .reading-card{background:var(--surface2);border-radius:var(--r);padding:15px;margin-bottom:10px}
  .rc-title{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .rc-text{font-size:13px;line-height:1.9}
  .rc-sub{font-size:12px;color:var(--text2);line-height:1.8;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--line)}
  .rc-label{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:3px}
  .health-item{font-size:12px;line-height:1.8;margin-bottom:6px}
  .health-item b{font-size:11px;color:var(--text2);font-weight:600;display:block}
  .fumei-note{background:var(--amber-bg);border-radius:var(--r-sm);padding:9px 11px;font-size:11px;color:var(--amber);line-height:1.6;margin-bottom:10px;display:flex;gap:6px;align-items:flex-start}
  .year-detail{border:0.5px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:9px}
  .year-detail.now{border-color:var(--green);background:var(--green-bg)}
  .yd-year{font-size:13px;font-weight:600;margin-bottom:6px}.year-detail.now .yd-year{color:var(--green-d)}
  .yd-main{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
  .yd-gz{font-size:20px;font-weight:600}.yd-tsu{font-size:12px;font-weight:600}.yd-stars{font-size:12px;color:#ba7517;margin-left:auto}
  .yd-text{font-size:12px;color:var(--text2);line-height:1.7}
  .yojin-flag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:10px;margin-top:7px}
  .yf-hit{background:var(--green-d);color:#fff}.yf-ki{background:var(--red-bg);color:var(--red-d)}.yf-neutral{background:var(--surface2);color:var(--text2)}
  .month-list{display:flex;flex-direction:column;gap:5px}
  .mo-row{display:grid;grid-template-columns:38px 36px 1fr auto auto;gap:6px;align-items:center;padding:9px 10px;background:var(--surface2);border:0.5px solid transparent;border-radius:var(--r-sm);font-size:12px;cursor:pointer}
  .mo-row.current{border-color:var(--green);background:var(--green-bg)}
  .mo-row.daikichi{border-color:var(--green)}.mo-row.kyo{border-color:var(--red);background:var(--red-bg)}.mo-row.chui{border-color:rgba(186,117,23,0.4);background:var(--amber-bg)}
  .mo-ym{color:var(--text2);font-size:11px}.mo-gz{font-size:13px;font-weight:600}.mo-tsu{font-size:10px;color:var(--text2)}
  .mo-badge{font-size:10px;padding:2px 7px;border-radius:8px;white-space:nowrap}
  .bg-daikichi{background:var(--green-d);color:#fff}.bg-good{background:var(--green-bg);color:var(--green-d)}.bg-normal{background:var(--surface2);color:var(--text2)}.bg-chui{background:var(--amber-bg);color:var(--amber)}.bg-kyo{background:var(--red-bg);color:var(--red-d)}
  .mo-detail{font-size:11px;color:var(--text2);line-height:1.7;padding:9px 11px;background:var(--surface);border-radius:var(--r-sm);margin-bottom:3px;border:0.5px solid var(--line)}
  .mo-detail .md-yojin{color:var(--green-d);font-weight:600}
  .best-info{background:var(--green-bg);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:9px;font-size:12px;line-height:1.6}.best-info b{color:var(--green-d)}
  .daiyun-list{display:flex;flex-direction:column;gap:5px}
  .dy-row{display:grid;grid-template-columns:50px 1fr auto auto;gap:7px;align-items:center;padding:9px 11px;background:var(--surface2);border:0.5px solid transparent;border-radius:var(--r-sm);font-size:12px}
  .dy-row.current{border-color:var(--green);background:var(--green-bg)}
  .dy-age{color:var(--text2);font-size:11px}.dy-gz{font-size:15px;font-weight:600}.dy-tsu{font-size:11px;color:var(--text2)}
  .tabs{display:flex;gap:6px;margin-bottom:12px}
  .tab{flex:1;font-size:12px;padding:7px 4px;border:0.5px solid var(--line2);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;text-align:center}
  .tab.active{background:var(--blue-bg);color:var(--blue);border-color:transparent;font-weight:600}
  .best-card{background:var(--green-bg);border:0.5px solid var(--green-line);border-radius:var(--r);padding:14px;margin-bottom:12px}
  .bc-head{font-size:12px;color:var(--green-d);margin-bottom:7px}
  .bc-dir{font-size:24px;font-weight:600;margin-bottom:5px}
  .bc-desc{font-size:12px;color:var(--text2);line-height:1.6}.bc-desc b{color:var(--green-d)}
  .meta{display:flex;gap:5px;flex-wrap:wrap;font-size:11px;color:var(--text2);margin-bottom:12px;padding:8px 10px;background:var(--surface2);border-radius:var(--r-sm);line-height:1.8}
  .meta b{color:var(--text);font-weight:600}
  .ju-box{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
  .ybox{background:var(--green-bg);color:var(--green-d)}.ibox{background:var(--red-bg);color:var(--red-d)}
  .nav-card{background:var(--surface2);border-radius:var(--r);padding:15px;margin-bottom:12px}
  .nav-head{font-size:12px;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:5px}
  .nav-sub{font-size:11px;color:var(--text3);margin-bottom:12px;line-height:1.5}
  .dir-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .dc{border-radius:var(--r-sm);padding:11px 13px}
  .dc-good{background:var(--green-bg);border:0.5px solid var(--green-line)}
  .dc-bad{background:var(--red-bg);border:0.5px solid var(--red-line)}
  .dc-head{font-size:11px;margin-bottom:4px;font-weight:600}
  .dc-good .dc-head{color:var(--green-d)}.dc-bad .dc-head{color:var(--red-d)}
  .dc-dir{font-size:19px;font-weight:700;line-height:1.1}.dc-bad .dc-dir{color:var(--red-d)}
  .dc-deg{font-size:11px;font-weight:400}.dc-good .dc-deg{color:var(--green-d)}.dc-bad .dc-deg{color:var(--red-d)}
  .compass-stage{display:flex;justify-content:center;margin-bottom:12px;position:relative}
  .heading-pin{position:absolute;top:-2px;left:50%;transform:translateX(-50%);z-index:5;font-size:18px;color:var(--blue)}
  .status-line{text-align:center;font-size:13px;margin-bottom:12px;padding:10px;border-radius:var(--r-sm);line-height:1.5}
  .status-aligned{background:var(--green-bg);color:var(--green-d);font-weight:600}
  .status-danger{background:var(--red-bg);color:var(--red-d);font-weight:600}
  .status-turn{background:var(--surface);color:var(--text2);border:0.5px solid var(--line)}
  .legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;font-size:11px;color:var(--text2);margin-bottom:12px}
  .lg{display:flex;align-items:center;gap:4px}.lg-dot{width:10px;height:10px;border-radius:50%}
  .lg-zone{width:12px;height:12px;border-radius:3px;background:rgba(226,75,74,0.22);border:1px solid var(--red)}
  .demo-area{background:var(--surface);border:0.5px solid var(--line);border-radius:var(--r-sm);padding:12px;margin-bottom:12px}
  .demo-label{font-size:11px;color:var(--text2);margin-bottom:8px}
  .demo-slider{width:100%}
  .good-sec-head{display:flex;align-items:center;gap:9px;margin:6px 0 8px}
  .good-sec-icon{width:28px;height:28px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0}
  .good-sec-title{font-size:15px;font-weight:600}
  .good-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .good-card{background:var(--green-bg);border:0.5px solid var(--green-line);border-radius:var(--r-sm);padding:11px 9px;text-align:center}
  .gc-label{font-size:10px;color:var(--green-d);margin-bottom:4px;font-weight:600}
  .gc-main{font-size:17px;font-weight:700;color:var(--text);line-height:1.15;margin-bottom:1px}
  .gc-main .unit{font-size:11px;font-weight:400}
  .gc-sub{font-size:9px;color:var(--text3);margin-top:3px}
  .warn-sec-head{display:flex;align-items:center;gap:9px;margin:18px 0 6px}
  .warn-sec-icon{width:28px;height:28px;border-radius:8px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0}
  .warn-sec-title{font-size:15px;font-weight:600}
  .warn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .warn-card{background:var(--red-bg);border:0.5px solid var(--red-line);border-radius:var(--r-sm);padding:11px 9px;display:flex;flex-direction:column}
  .wc-head{display:flex;align-items:center;gap:5px;margin-bottom:7px}
  .wc-icon{width:18px;height:18px;border-radius:50%;background:#c0392b;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .wc-label{font-size:11px;font-weight:600;color:var(--red-d)}
  .wc-main{font-size:18px;font-weight:700;color:var(--red-d);line-height:1.15;margin-bottom:1px}
  .wc-main .unit{font-size:11px;font-weight:400}.wc-main .cnt{font-size:11px;font-weight:500;margin-left:3px}
  .wc-sub{font-size:10px;color:var(--red-d);margin-bottom:7px}
  .wc-desc{font-size:10px;color:var(--text2);line-height:1.55;flex:1}
  .use-card{background:var(--surface2);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:14px}
  .use-head{display:flex;align-items:center;gap:7px;margin-bottom:5px}.use-title{font-size:13px;font-weight:600;color:var(--red-d)}
  .use-text{font-size:12px;color:var(--text2);line-height:1.7}
  .board-title{font-size:13px;font-weight:600;margin:14px 0 8px}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
  .cell{border:0.5px solid var(--line);border-radius:var(--r-sm);padding:6px 4px;min-height:82px;display:flex;flex-direction:column;gap:1px;background:var(--surface)}
  .cell.ctr{background:var(--surface2)}
  .cell.lucky{border-color:var(--green);background:var(--green-bg)}
  .cell.unlucky{border-color:var(--red);background:var(--red-bg)}
  .cell.kuxing{opacity:.7}
  .cell.yojin-dir{box-shadow:inset 0 0 0 2px var(--blue)}

.nh-cat.c-work{background:linear-gradient(165deg,#eef3fb,#e1ebf7);border-color:#cfdcf0}
.nh-cat.c-health{background:linear-gradient(165deg,#eef7f0,#e0f0e6);border-color:#cae6d3}
.nh-cat.c-study{background:linear-gradient(165deg,#f4eefb,#eae0f6);border-color:#ddccf0}

/* --- 方位コンパス / NG --- */
.nh-panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:11px;box-shadow:0 2px 8px rgba(80,70,40,.05)}
.nh-ptitle{display:flex;align-items:center;gap:7px;font-family:"Shippori Mincho B1",serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px}
.nh-dirwrap{display:flex;align-items:center;gap:8px}
.nh-compass{flex:0 0 176px}
.nh-compass svg{width:176px;height:176px;display:block}
.nh-dirinfo{flex:1;min-width:0}
.nh-dirbig{font-family:"Shippori Mincho B1",serif;margin-bottom:4px}

.nh-dirbig span{font-size:13px;color:var(--text2);margin-left:4px}
.nh-dirdesc{font-size:11px;color:var(--text2);line-height:1.55;margin-bottom:10px}
.nh-dirtag{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:4px 9px;border-radius:11px;font-weight:600;margin-bottom:4px}

.nh-dirtag.red{background:var(--red-bg);color:var(--red-d);border:1px solid var(--red-line)}

.nh-dirval .s{font-size:11px;font-weight:400;color:var(--text2);margin-left:3px}
.nh-ng .nh-ngrow{margin-bottom:11px}
.nh-ng .nh-nglab{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--red-d);margin-bottom:5px}
.nh-ng .nh-ngval{font-family:"Shippori Mincho B1",serif;font-size:19px;font-weight:700;color:var(--text)}
.nh-ng .nh-ngsub{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.5}

/* --- ラッキーアイテム --- */
.nh-lucky{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.nh-luck{text-align:center}

.nh-luck-num{font-family:"Shippori Mincho B1",serif;font-size:24px;font-weight:800;color:var(--gold-dim);line-height:1}

.nh-acts{display:flex;flex-wrap:wrap;gap:8px}
.nh-act{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#2c6a52;background:var(--green-bg);border:1px solid var(--green-line);border-radius:20px;padding:8px 13px;font-weight:600}

/* --- 一言アドバイス（紺の星空フッター） --- */
.nh-advice{position:relative;border-radius:16px;padding:16px 16px 16px 56px;margin-bottom:8px;overflow:hidden;color:#e7e0cf;
  background:
   radial-gradient(1.3px 1.3px at 76% 30%,rgba(255,255,255,.8),transparent),
   radial-gradient(1.2px 1.2px at 88% 64%,rgba(255,255,255,.6),transparent),
   radial-gradient(1.1px 1.1px at 64% 78%,rgba(255,255,255,.5),transparent),
   linear-gradient(120deg,#1b2350,#28335f);
  border:1px solid rgba(205,169,79,.4)}
.nh-advice-ic{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;border:1px solid rgba(205,169,79,.6);display:flex;align-items:center;justify-content:center;font-size:15px}
.nh-advice-cap{font-size:11px;color:#e6cd83;letter-spacing:.06em;margin-bottom:4px}
.nh-advice-txt{font-size:12.5px;line-height:1.7;color:#dfe2f0}

.fld-group{padding:11px 0 2px;border-top:0.5px solid var(--line)}

.stg-profile-card{background:var(--surface);border:0.5px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 6px rgba(0,0,0,.05)}

.stg-profile-body{flex:1;min-width:0}
.stg-profile-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stg-profile-meta{font-size:11.5px;color:var(--text2);margin-top:1px}

.stg-switch-btn{font-size:11.5px;font-weight:600;padding:7px 13px;border:0.5px solid var(--gold-dim);border-radius:20px;background:linear-gradient(135deg,rgba(205,169,79,.16),rgba(205,169,79,.08));color:var(--gold-soft);cursor:pointer;font-family:inherit;flex-shrink:0;white-space:nowrap}
.stg-sec-head{display:flex;align-items:flex-start;gap:10px;padding:4px 2px 8px;margin-top:8px}

.stg-sec-ic.blue{background:var(--blue-bg);color:var(--blue-d)}
.stg-sec-ic.green{background:var(--green-bg);color:var(--green-d)}
.stg-sec-ic.gray{background:var(--surface2);color:var(--text2)}
.stg-sec-texts{flex:1}
.stg-sec-title{font-size:14px;font-weight:700;color:var(--gold-soft)}
.stg-sec-sub{font-size:11px;color:var(--text3);margin-top:1px;line-height:1.4}
.stg-list-card{background:var(--surface);border:0.5px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.stg-det{overflow:hidden}
.stg-det+.stg-det,.stg-plain-row+.stg-det,.stg-det+.stg-plain-row,.stg-plain-row+.stg-plain-row{border-top:0.5px solid var(--line)}
.stg-sum{list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:13px 14px;-webkit-tap-highlight-color:rgba(0,0,0,.04)}
.stg-sum:active{background:var(--surface2)}
.stg-sum::-webkit-details-marker{display:none}
.stg-plain-row{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,.04)}
.stg-plain-row:active{background:var(--surface2)}
.stg-row-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.stg-row-ic.gold{background:rgba(205,169,79,.16);color:var(--gold-soft)}
.stg-row-ic.blue{background:var(--blue-bg);color:var(--blue-d)}
.stg-row-ic.green{background:var(--green-bg);color:var(--green-d)}
.stg-row-ic.red{background:var(--red-bg);color:var(--red-d)}
.stg-row-ic.gray{background:var(--surface2);color:var(--text2)}

.msr{font-family:'Material Symbols Rounded';font-weight:400;font-style:normal;font-size:20px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-feature-settings:'liga';font-feature-settings:'liga';-webkit-font-smoothing:antialiased;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.stg-sec-ic .msr{font-size:15px}

.stg-chev.msr{font-size:19px;color:var(--text3)}
.stg-badge-icon{font-size:12px;color:var(--text2)}
.stg-chev{font-size:14px;color:var(--text3);line-height:1;transition:transform .2s}
.stg-det[open] .stg-chev{transform:rotate(90deg)}

function sunLon(jd){var T=(jd-2451545)/36525,L0=280.46646+36000.76983*T,M=(357.52911+35999.05029*T)*Math.PI/180;var C=(1.914602-0.004817*T)*Math.sin(M)+(0.019993-0.000101*T)*Math.sin(2*M)+0.000289*Math.sin(3*M);return((L0+C)%360+360)%360;}
function dateToJD(d){var y=d.getFullYear(),mo=d.getMonth()+1,day=d.getDate(),h=d.getHours()/24+d.getMinutes()/1440;var A=Math.floor((14-mo)/12),Y=y+4800-A,M=mo+12*A-3;return day+Math.floor((153*M+2)/5)+365*Y+Math.floor(Y/4)-Math.floor(Y/100)+Math.floor(Y/400)-32045+h-0.5;}
function jdForLon(year,target){var jd=dateToJD(new Date(year,0,1)),best=jd,bestD=360;for(var d=0;d<400;d++){var lon=sunLon(jd+d),dif=((lon-target+360)%360);if(dif>180)dif=360-dif;if(dif<bestD){bestD=dif;best=jd+d;}}var lo=best-2,hi=best+2;for(var i=0;i<50;i++){var mid=(lo+hi)/2,l2=sunLon(mid),d2=((l2-target+540)%360)-180;if(Math.abs(d2)<0.00001)return mid;if(d2<0)lo=mid;else hi=mid;}return(lo+hi)/2;}
function getSurrSetsu(date){var jd=dateToJD(date),yr=date.getFullYear(),all=[];for(var y=yr-1;y<=yr+1;y++)SETSU_LONS.forEach(function(lon,i){all.push({jd:jdForLon(y,lon),name:SETSU_NAMES[i],lon:lon});});all.sort(function(a,b){return a.jd-b.jd;});var prev=null,next=null;for(var i=0;i<all.length;i++){if(all[i].jd<=jd)prev=all[i];else{next=all[i];break;}}return{prev:prev,next:next};}
function getSurrJQ(date){var jd=dateToJD(date),yr=date.getFullYear(),all=[];for(var y=yr-1;y<=yr+1;y++)JQ_LONS.forEach(function(lon,i){all.push({jd:jdForLon(y,lon),name:JQ_NAMES[i],lon:lon});});all.sort(function(a,b){return a.jd-b.jd;});var prev=null,next=null;for(var i=0;i<all.length;i++){if(all[i].jd<=jd)prev=all[i];else{next=all[i];break;}}return{prev:prev,next:next};}

function isYang(date){var s=getSurrJQ(date),prev=s.prev;if(!prev)return true;return[270,285,300,315,330,345,0,15,30,45,60,75,90].indexOf(prev.lon)>=0;}
function getJuNumber(date){var yang=isYang(date),g=getGen(date),gi=g.genIdx,jq=g.jieqi;if(!jq)return{ju:yang?1:9,yang:yang};if(yang){var si=YANG_JQ.indexOf(jq.name);return{ju:si>=0?YANG_JU[si][gi]:1,yang:yang};}else{var si=YIN_JQ.indexOf(jq.name);return{ju:si>=0?YIN_JU[si][gi]:9,yang:yang};}}
function getJunshu(d){var ep=new Date(2020,0,17),n60=((Math.floor((d-ep)/86400000)%60)+60)%60,tg=n60%10,dz=n60%12,js=((dz-tg)%12+12)%12;var jo=[0,10,8,6,4,2],jn=['甲子旬','甲戌旬','甲申旬','甲午旬','甲辰旬','甲寅旬'],ji=jo.indexOf(js);return{junName:ji>=0?jn[ji]:'甲'+DZ[js]+'旬',junshuDZIdx:js,ku1:(js+10)%12,ku2:(js+11)%12};}
function yKanIdx(y){return((y-4)%10+10)%10;}
function yJiIdx(y){return((y-4)%12+12)%12;}
function getMonthGZi(d){var SET=[315,345,15,45,75,105,135,165,195,225,255,285];var s=getSurrSetsu(d),lon=s.prev?s.prev.lon:315,mIdx=SET.indexOf(lon),yk=yKanIdx(d.getFullYear()),base=[2,4,6,8,0][yk%5];return{t:(base+mIdx)%10,b:(mIdx+2)%12};}
function dayGZi(d){var ep=new Date(2020,0,17),n=Math.floor((d-ep)/86400000);return{t:((n%10)+10)%10,b:((n%12)+12)%12};}
function timeGZi(d){var ep=new Date(2020,0,17),dd=Math.floor((new Date(d.getFullYear(),d.getMonth(),d.getDate())-ep)/86400000);var ti=((dd%5+5)%5)*2,hi=Math.floor(((d.getHours()+1)%24)/2);return{t:(ti+hi)%10,b:hi};}
function tsuhensei(dSt,tSt){var de=GOGYO[dSt],te=GOGYO[tSt],sp=YYS[dSt]===YYS[tSt];if(de===te)return sp?'比肩':'劫財';if(GEN_C[de]===te)return sp?'食神':'傷官';if(KOK_C[de]===te)return sp?'偏財':'正財';if(KOK_C[te]===de)return sp?'偏官':'正官';if(GEN_C[te]===de)return sp?'偏印':'印綬';return '';}

function buildBoard(date,tab){
  var r=getJuNumber(date),ju=r.ju,yang=r.yang,off=yang?ju-1:(9-ju);
  if(tab==='ri'){var e0=new Date(2020,0,17);off=((Math.floor((date-e0)/86400000)+ju-1)%9+9)%9;}
  else if(tab==='yue')off=((getSM(date)+ju-1)%9+9)%9;
  else if(tab==='nian')off=((date.getFullYear()-4)%9+9)%9;
  else{var hh=Math.floor(((date.getHours()+1)%24)/2);off=((off+(yang?hh:(9-hh)%9))%9+9)%9;}
  var ji=getJunshu(date),ku1=ji.ku1,ku2=ji.ku2,kuP1=DZ_TO_PAL[ku1],kuP2=DZ_TO_PAL[ku2],chu=yang?2:8;
  var cells=PALACES.map(function(palNum,idx){
    var ep=palNum===5?chu:palNum,sIdx,gIdx,dIdx;
    if(yang){sIdx=((ep-1+off)%9+9)%9;gIdx=sIdx;dIdx=((ep-1+off+2)%9+9)%9;}
    else{sIdx=((8-(ep-1)+off)%9+9)%9;gIdx=sIdx;dIdx=((8-(ep-1)+off+2)%9+9)%9;}
    var star=STARS[sIdx],gateRaw=palNum===5?'（寄）':GATES[gIdx],deityRaw=palNum===5?'（寄）':DEITIES[dIdx];
    var gsi=GND_STEM_BY_PAL[palNum],tsi=yang?((gsi+off)%9+9)%9:((gsi-off+90)%9+9)%9;
    var luck=(SL[star]||0)+(GL[GATES[gIdx]]||0)+(DL[DEITIES[dIdx]]||0);
    return{palNum:palNum,dir:DIR[idx],tri:TRI[idx],gogyo:PAL_GOGYO[palNum],star:star,gateRaw:gateRaw,deityRaw:deityRaw,gndStem:TG[gsi],tenStem:TG[tsi],luck:luck,idx:idx,isKu:palNum===kuP1||palNum===kuP2,isCtr:palNum===5};
  });
  var zfPal=DZ_TO_PAL[ji.junshuDZIdx],zfCell=null;for(var i=0;i<cells.length;i++){if(cells[i].palNum===zfPal){zfCell=cells[i];break;}}
  var board={cells:cells,junName:ji.junName,ku1:ku1,ku2:ku2,yang:yang,ju:ju,zfCell:zfCell,zsGate:zfCell?zfCell.gateRaw:'—'};
  board.kakukyoku=judgeKK(board);return board;
}
var KK_DEFS=[
  {name:'青龍返首',type:'good',stars:5,trans:'営業・交渉・契約に大吉',check:function(b){return b.zfCell&&['開門','生門','休門'].indexOf(b.zfCell.gateRaw)>=0;}},
  {name:'飛鳥跌穴',type:'bad',stars:1,trans:'重要な決断・移動は控えめに',check:function(b){return b.zfCell&&['死門','驚門','傷門'].indexOf(b.zfCell.gateRaw)>=0;}},

];
function judgeKK(b){var res=[];KK_DEFS.forEach(function(d){try{if(d.check(b))res.push({name:d.name,type:d.type,stars:d.stars,trans:d.trans});}catch(e){}});res.sort(function(a,b2){if(a.type!==b2.type)return a.type==='good'?-1:1;return b2.stars-a.stars;});return res;}

function calcDaiyun(birth,sex,mode){
  var ykan=yKanIdx(birth.getFullYear()),yYin=YYS[TG[ykan]];
  var forward=(sex==='M'&&yYin===1)||(sex==='F'&&yYin===0);
  var s=getSurrSetsu(birth),jd=dateToJD(birth),target=forward?s.next:s.prev;
  var days=Math.abs(target.jd-jd),startAge=roundRitsuun(days/3,mode);
  var mGZ=getMonthGZi(birth),dStem=TG[dayGZi(birth).t],rows=[];
  for(var i=0;i<8;i++){var step=forward?(i+1):-(i+1);var t=((mGZ.t+step)%10+10)%10,b=((mGZ.b+step)%12+12)%12;rows.push({age:startAge+i*10,gz:TG[t]+DZ[b],stem:TG[t],tsu:tsuhensei(dStem,TG[t])});}
  return{forward:forward,startAge:startAge,days:days,setsu:target.name,rows:rows};
}

/* 吉方位・凶方位の抽出（用神連動） */
function extractDirections(board,yojin){
  board.cells.forEach(function(c){
    c.yojinDir=yojin.yojinEl.indexOf(c.gogyo)>=0;
    c.kishinDir=yojin.kishinEl.indexOf(c.gogyo)>=0;
    c.isSuper=c.luck>=2&&!c.isKu&&c.yojinDir;
  });
  var supers=board.cells.filter(function(c){return c.isSuper;}).sort(function(a,b){return b.luck-a.luck;});
  var lucky=board.cells.filter(function(c){return c.luck>=2&&!c.isKu&&!c.isCtr;}).sort(function(a,b){return b.luck-a.luck;});
  var yd=board.cells.filter(function(c){return c.yojinDir&&!c.isCtr;});
  var best=supers[0]||lucky[0]||yd[0]||null;
  // 凶方位：luck最低かつ非中宮（忌神方位を優先）
  var bad=board.cells.filter(function(c){return !c.isCtr;}).slice().sort(function(a,b){
    var aw=(a.kishinDir?-1:0)+a.luck, bw=(b.kishinDir?-1:0)+b.luck;return aw-bw;
  });
  var worst=bad[0]||null;
  return{best:best,worst:worst,bestType:supers.length?'super':(lucky.length?'kichi':'yojin')};
}

function equationOfTime(date){var start=new Date(date.getFullYear(),0,0);var N=Math.floor((date-start)/86400000);var B=2*Math.PI*(N-81)/365;return 9.87*Math.sin(2*B)-7.53*Math.cos(B)-1.5*Math.sin(B);}
function sgnMin(m){return (m>=0?'+':'−')+Math.abs(m).toFixed(1)+'分';}
function buildChartData(profile,mode){
  var noTime=!profile.birthTime;
  var birth=new Date(profile.birthDate+'T'+(profile.birthTime||'12:00'));
  var solar=birth,solarInfo=null;
  if(!noTime){var bco=parseCoords(profile.coords);if(bco){var lonCorr=(bco[1]-135)*4,eot=equationOfTime(birth),totalMin=lonCorr+eot;solar=new Date(birth.getTime()+totalMin*60000);solarInfo={lonCorr:lonCorr,eot:eot,total:totalMin,lng:bco[1]};}}
  var y={t:yKanIdx(birth.getFullYear()),b:yJiIdx(birth.getFullYear())},m=getMonthGZi(birth),dd=dayGZi(noTime?birth:solar);
  var dStem=TG[dd.t],dGogyo=GOGYO[dStem];
  var pillars=[{label:'年',stem:TG[y.t],branch:DZ[y.b]},{label:'月',stem:TG[m.t],branch:DZ[m.b]},{label:'日',stem:TG[dd.t],branch:DZ[dd.b]}];
  if(!noTime){var h=timeGZi(solar);pillars.push({label:'時',stem:TG[h.t],branch:DZ[h.b]});}
  pillars.forEach(function(p){p.tsu=p.label==='日'?'日主':tsuhensei(dStem,p.stem);p.zou=HIDDEN_STEM[p.branch];p.zouTsu=tsuhensei(dStem,p.zou);});
  var score={木:0,火:0,土:0,金:0,水:0};
  pillars.forEach(function(p){score[GOGYO[p.stem]]+=1.0;score[GOGYO[p.zou]]+=0.7;});
  score[GOGYO[pillars[1].zou]]+=0.6;
  var total=0;for(var k in score)total+=score[k];
  var helpEl=[dGogyo,GEN_OF[dGogyo]],help=0,drain=0;
  for(var k in score){if(helpEl.indexOf(k)>=0)help+=score[k];else drain+=score[k];}
  var isStrong=help>=drain,yojinEl,kishinEl;
  if(isStrong){yojinEl=[KOK_OF[dGogyo],GEN_C[dGogyo]];kishinEl=[dGogyo,GEN_OF[dGogyo]];}
  else{yojinEl=[GEN_OF[dGogyo],dGogyo];kishinEl=[KOK_OF[dGogyo],GEN_C[dGogyo]];}
  var yojin={dStem:dStem,dGogyo:dGogyo,isStrong:isStrong,help:help,drain:drain,yojinEl:yojinEl,kishinEl:kishinEl,primaryYojin:yojinEl[0]};
  var daiyun=calcDaiyun(birth,profile.sex,mode);
  var now=new Date(),nowAge=now.getFullYear()-birth.getFullYear(),curIdx=-1;
  for(var i=0;i<daiyun.rows.length;i++){if(nowAge>=daiyun.rows[i].age)curIdx=i;}
  var todayGZ=dayGZi(now),nichiun=tsuhensei(dStem,TG[todayGZ.t]);
  var boardTab=noTime?'ri':'shi';
  var kimon=buildBoard(now,boardTab);
  var dirs=extractDirections(kimon,yojin);
  // 金運方位：財星（剋す五行＝日主がKOK_Cする相手）に対応する方位
  var wealthEl=KOK_C[dGogyo];
  var wealthDirs=DIR.filter(function(d,i){return PAL_GOGYO[PALACES[i]]===wealthEl;});
  return{noTime:noTime,birth:birth,solarInfo:solarInfo,sex:profile.sex,dStem:dStem,dGogyo:dGogyo,pillars:pillars,score:score,total:total,yojin:yojin,daiyun:daiyun,curIdx:curIdx,nichiun:nichiun,nichiunGZ:TG[todayGZ.t]+DZ[todayGZ.b],kimon:kimon,dirs:dirs,boardTab:boardTab,wealthEl:wealthEl,wealthDirs:wealthDirs,now:now};
}

function loveRadarSVG(vals){

  var g='';[20,40,60,80,100].forEach(function(v,i){g+='<circle cx="'+C+'" cy="'+C+'" r="'+(R*v/100).toFixed(1)+'" fill="none" stroke="rgba(205,169,79,'+(0.10+i*0.04).toFixed(2)+')" stroke-width="1"/>';});

function monthFortune(monthTsu,dStem,monthStem,yojin){
  var base=TSU_BASE[monthTsu],de=GOGYO[dStem],me=GOGYO[monthStem];
  if(GEN_C[me]===de)base+=1;if(KOK_C[me]===de)base-=1;
  var hit='neutral';
  if(yojin.yojinEl.indexOf(me)>=0){base+=2;hit='hit';}else if(yojin.kishinEl.indexOf(me)>=0){base-=2;hit='ki';}
  var lv;
  if(base>=3)lv={label:'大吉',cls:'bg-daikichi',row:'daikichi'};
  else if(base>=1)lv={label:'吉',cls:'bg-good',row:''};
  else if(base>=0)lv={label:'平',cls:'bg-normal',row:''};
  else if(base>=-1)lv={label:'注意',cls:'bg-chui',row:'chui'};
  else lv={label:'凶',cls:'bg-kyo',row:'kyo'};
  return{level:lv,hit:hit,me:me};
}

function diaryScore(bd,date){
  var td=dayGZi(date),ty=yKanIdx(date.getFullYear()),tyj=yJiIdx(date.getFullYear()),tm=getMonthGZi(date),sc=65;
  var TK=[ty,tm.t,td.t];for(var i=0;i<KAN_GO.length;i++){var a=KAN_GO[i][0],b=KAN_GO[i][1];if(TK.some(function(k){return (k===a&&bd.t===b)||(k===b&&bd.t===a);})){sc+=20;break;}}
  var TJ=[tyj,tm.b,td.b];
  JI_GO.forEach(function(pr){if(TJ.some(function(j){return (j===pr[0]&&bd.b===pr[1])||(j===pr[1]&&bd.b===pr[0]);}))sc+=8;});
  JI_CHONG.forEach(function(pr){if(TJ.some(function(j){return (j===pr[0]&&bd.b===pr[1])||(j===pr[1]&&bd.b===pr[0]);}))sc-=8;});
  JI_HARM.forEach(function(pr){if(TJ.some(function(j){return (j===pr[0]&&bd.b===pr[1])||(j===pr[1]&&bd.b===pr[0]);}))sc-=4;});
  var dG=GOGYO[TG[bd.t]],tG=GOGYO[TG[td.t]];
  if(GEN_C[dG]===tG||GEN_C[tG]===dG)sc+=10;if(KOK_C[dG]===tG||KOK_C[tG]===dG)sc-=5;if(bd.t===td.t)sc+=6;
  return Math.max(55,Math.min(100,sc));
}

    if(sB===ekiba)add('move',1.0,'駅馬の年（移動・転居の星）');
    if(ltChong(sB,dB))add('move',0.7,'日支と沖（住環境の変化）');
    if(ltChong(sB,yB))add('move',0.3,'年支と沖');
    if(w)add('move',0.4,'大運の切り替わり');
    // 結婚・縁
    if(spouseTen.indexOf(ten)>=0)add('marry',0.8,'配偶星（'+ten+'）が巡る');
    if(ltLiuHe(sB,dB))add('marry',0.8,'日支と六合（縁が結ばれる）');
    else if(ltSanHe(sB,dB))add('marry',0.5,'日支と三合');
    if(sB===touka)add('marry',0.6,'桃花の年（人気・恋愛の星）');
    // 子宝・縁
    if(childTen.indexOf(ten)>=0)add('child',0.8,(sex==='F'?'食傷':'官星')+'（'+ten+'）が巡る（子の星）');
    if(hB!=null){ if(ltLiuHe(sB,hB))add('child',0.5,'時柱と六合（子の宮が動く）'); else if(ltSanHe(sB,hB))add('child',0.35,'時柱と三合'); }
    if(sB===touka)add('child',0.25,'桃花の年');
    // 家族
    if(ten==='比肩'||ten==='劫財')add('family',0.6,'比劫の年（張り合い・出費）');
    if(ltChong(sB,yB))add('family',0.6,'年支と沖（親・目上の宮）');
    if(ltChong(sB,mB))add('family',0.3,'月支と沖');
    if(ltXing(sB,dB))add('family',0.3,'刑（こじれ）');
    // 健康・事故
    var clash=0; if(ltChong(sB,dB)){clash++;add('health',0.6,'日支と沖');}
    if(ltXing(sB,dB)){clash++;add('health',0.4,'日支と刑');}
    if(ten==='偏官')add('health',0.5,'七殺（偏官）が巡る（負荷の年）');
    var yk=ltYaku(kazoe,sex);
    if(yk){add('yaku',yk===2?1.0:0.6,yk===2?'本厄（数え'+kazoe+'）':'前厄・後厄（数え'+kazoe+'）');add('health',yk===2?0.5:0.25,'厄年と重なる');}
    if(clash>=2)add('health',0.3,'沖・刑が重なる');
    // 幼少期(15歳未満)は本人の仕事・結婚・子宝を読まない
    if(age<15){s.job=0;s.marry=0;s.child=0;s.why.job=[];s.why.marry=[];s.why.child=[];
      if(ltChong(sB,yB)||ltChong(sB,mB))s.family=Math.max(s.family,0.6);}
    ['study','move','job','marry','health','family','child','yaku'].forEach(function(k){if(s[k]>1)s[k]=1;});
    var fired=['study','move','job','marry','health','family','child'].filter(function(k){return s[k]>=0.6;}).length;
    s.total=0.34*s.move+0.34*s.job+0.42*s.marry+0.46*s.health+0.3*s.family+0.28*s.yaku+0.3*s.child+0.18*s.study+(w?0.5:0)+0.22*fired;
    if(s.total>1)s.total=1; s.switch=w;
    rows.push(s);
  }
  return {rows:rows,daiun:dAges,by:by,nowAge:cd.now.getFullYear()-by};
}

function geocode(query,cb){
  query=(query||'').trim(); if(!query){cb([]);return;}
  if(APP.googleKey){
    ensureGoogle(function(ok){
      if(!ok||!_gGeocoder){cb(null,'Google初期化失敗（キーをご確認ください）');return;}
      _gGeocoder.geocode({address:query},function(results,status){
        if(status==='OK'){cb((results||[]).map(function(x){
          var parts=(x.formatted_address||'').split(',').map(function(p){return p.trim();});
          return {name:x.formatted_address,shortName:parts[0],address:parts.slice(1).filter(Boolean).join(' '),lat:x.geometry.location.lat(),lng:x.geometry.location.lng()};
        }));}
        else if(status==='ZERO_RESULTS'){cb([]);}
        else{cb(null,status);}
      });
    });
  } else {
    fetch('https://nominatim.openstreetmap.org/search?format=jsonv2&accept-language=ja&limit=6&q='+encodeURIComponent(query),{headers:{Accept:'application/json'}})
      .then(function(r){return r.json();})
      .then(function(arr){cb((arr||[]).map(function(x){
        var parts=(x.display_name||'').split(',').map(function(p){return p.trim();});
        var addr=parts.slice(1).filter(function(p){return p&&p!=='日本'&&p!=='Japan';}).slice(0,3).join('、');
        return {name:x.display_name,shortName:parts[0],address:addr,lat:parseFloat(x.lat),lng:parseFloat(x.lon)};
      }));})
      .catch(function(){cb(null);});
  }
}

function calcBearing(la1,lo1,la2,lo2){var p1=la1*Math.PI/180,p2=la2*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;var yy=Math.sin(dl)*Math.cos(p2),xx=Math.cos(p1)*Math.sin(p2)-Math.sin(p1)*Math.cos(p2)*Math.cos(dl);return (Math.atan2(yy,xx)*180/Math.PI+360)%360;}

function planTrips(outV,retV){
  var home=homeLatLng();
  var od=new Date(outV+'T12:00:00'),rd=new Date((retV||outV)+'T12:00:00');
  var y=APP.chartData?APP.chartData.yojin:null;

  try{extractDirections(ob,y);extractDirections(rb,y);}catch(e){}
  var go=[],need=[];
  Places.list.forEach(function(pl){
    var d=calcDist(home[0],home[1],pl.lat,pl.lng);if(d<0.02)return;
    var outDir=bearDir(calcBearing(home[0],home[1],pl.lat,pl.lng));
    var retDir=bearDir(calcBearing(pl.lat,pl.lng,home[0],home[1]));
    var oc=cellByDir(ob,outDir),rc=cellByDir(rb,retDir);
    var oL=oc?oc.luck:0,rL=rc?rc.luck:0,oBad=oL<=-1,rBad=rL<=-1;
    var rec={name:pl.name,outDir:outDir,retDir:retDir,oLuck:oL,rLuck:rL,oBad:oBad,rBad:rBad,dist:d};

function kimonScan(y){
  var key=fmtD2(new Date())+'|'+Store.activeId;
  if(APP._kimonScan&&APP._kimonScan.key===key)return APP._kimonScan;
  var base=new Date(),bestG=null,bestB=null,i;
  for(i=0;i<30;i++){
    var d=new Date(base.getFullYear(),base.getMonth(),base.getDate()+i);
    var bb=dayBoard(d);
    var g=0,bd2=0;

function fanFuYin(b){
  var zf=b.zfCell;if(!zf)return {fuyin:false,fanyin:false};
  var opp={1:9,9:1,2:8,8:2,3:7,7:3,4:6,6:4},oc=null;
  b.cells.forEach(function(c){if(c.palNum===opp[zf.palNum])oc=c;});
  var fu=zf.tenStem===zf.gndStem;
  var fan=!fu&&!!oc&&zf.tenStem===oc.gndStem;
  return {fuyin:fu,fanyin:fan};
}
/* ====== 盤から評価ファクターを抽出（八門・九星・八神・格局・空亡・反吟・伏吟） ====== */
function luckFactors(b){
  var f=[],zg=b.zsGate;
  if(['開門','生門','休門'].indexOf(zg)>=0)f.push({id:'zf_good',label:'値符が吉門（'+zg+'）',sign:1});
  else if(['死門','驚門','傷門'].indexOf(zg)>=0)f.push({id:'zf_bad',label:'値符が凶門（'+zg+'）',sign:-1});
  var sheng=b.cells.filter(function(c){return c.gateRaw==='生門';})[0];
  if(sheng){if(sheng.luck>=2&&!sheng.isKu)f.push({id:'sheng_good',label:'生門が好位置（生気あり）',sign:1});else if(sheng.isKu||sheng.luck<=-1)f.push({id:'sheng_bad',label:'生門が弱い配置（空亡/凶）',sign:-1});}
  var kai=b.cells.filter(function(c){return c.gateRaw==='開門';})[0];
  if(kai){if(kai.luck>=2&&!kai.isKu)f.push({id:'kai_good',label:'開門が好位置',sign:1});else if(kai.isKu||kai.luck<=-1)f.push({id:'kai_bad',label:'開門が弱い配置（空亡/凶）',sign:-1});}
  (b.kakukyoku||[]).forEach(function(k){if(k.type==='good')f.push({id:'kk_good',label:'吉格「'+k.name+'」',sign:1});else f.push({id:'kk_bad',label:'凶格「'+k.name+'」',sign:-1});});
  if(b.zfCell&&b.zfCell.isKu)f.push({id:'zf_kong',label:'値符が空亡（力が抜ける）',sign:-1});
  var ff=fanFuYin(b);
  if(ff.fuyin)f.push({id:'fuyin',label:'伏吟（停滞・物事が動きにくい）',sign:-1});
  if(ff.fanyin)f.push({id:'fanyin',label:'反吟（反転・変動が大きい）',sign:-1});
  ['生門','開門'].forEach(function(g){var c=b.cells.filter(function(x){return x.gateRaw===g;})[0];if(c){if(['白虎','玄武','螣蛇','勾陳'].indexOf(c.deityRaw)>=0)f.push({id:'kyo_deity',label:c.deityRaw+'が'+g+'に同宮（凶神）',sign:-1});else if(['値符','六合','太陰','九天','九地'].indexOf(c.deityRaw)>=0)f.push({id:'kichi_deity',label:c.deityRaw+'が'+g+'に同宮（吉神）',sign:1});}});
  return f;
}
function luckScore(b,pk){
  var P=LUCK_PROFILES[pk]||LUCK_PROFILES.money,fs=luckFactors(b),score=0,rg=[],rb=[],i;
  fs.forEach(function(f){var w=(P.weights[f.id]!=null?P.weights[f.id]:0.5);score+=f.sign*w;if(f.sign>0)rg.push(f.label);else rb.push(f.label);});
  var stars=0,label=P.kyoLabel||'凶';
  for(i=0;i<P.tiers.length;i++){if(score>=P.tiers[i][0]){stars=P.tiers[i][1];label=P.tiers[i][2];break;}}
  var color=stars>=4?'good':stars>=2?'mid':'bad';
  return {score:score,stars:stars,label:label,color:color,reasonsGood:rg,reasonsBad:rb,factors:fs};
}
function actionScore(sc,act){
  var A=MONEY_ACTIONS[act];if(!A)return sc.score;
  var ids=sc.factors.map(function(f){return f.id;}),s=sc.score;
  (A.fav||[]).forEach(function(id){if(ids.indexOf(id)>=0)s+=0.9;});
  (A.pen||[]).forEach(function(id){if(ids.indexOf(id)>=0)s-=0.9;});
  return s;
}

function legEval(d,board,fromLL,toLL,yojin){
  if(calcDist(fromLL[0],fromLL[1],toLL[0],toLL[1])<0.02)return {stars:3,isBad:false,score:0,dir:'—',yojin:false};
  var dir=bearDir(calcBearing(fromLL[0],fromLL[1],toLL[0],toLL[1]));
  extractDirections(board,yojin);
  var cell=cellByDir(board,dir),e=evalDestDay(d,cell,'all');

}
function evalGroupDay(d,members,destLL){
  var board=dayBoard(d),per=[];
  members.forEach(function(m){
    var e=legEval(d,board,tripLatLng(m.base),destLL,m.cd.yojin);
    per.push({id:m.id,name:m.name,stars:e.stars,isBad:e.isBad,score:e.score,yojin:e.yojin,dir:e.dir,base:m.base});
  });
  if(APP.chartData)extractDirections(board,APP.chartData.yojin); /* 復元 */
  var n=per.length,avg=per.reduce(function(a,b){return a+b.score;},0)/n;
  var anyBad=per.some(function(x){return x.isBad;}),allGood=per.every(function(x){return !x.isBad&&x.stars>=3;});
  var g=avg-(anyBad?1.4:0)+(allGood?0.6:0);
  var stars,label;
  if(g>=2.0){stars=5;label='全員に最高';}
  else if(g>=1.0){stars=4;label='全員に良好';}
  else if(g>=0.2){stars=3;label='おおむね良い';}
  else if(g>=-0.8){stars=2;label='やや注意';}
  else{stars=1;label='見送り推奨';}
  if(anyBad){var bn=per.filter(function(x){return x.isBad;}).map(function(x){return x.name;});label=bn.join('・')+'さんに凶';if(stars>2)stars=2;}
  return {date:d,per:per,g:g,stars:stars,label:label,anyBad:anyBad,allGood:allGood};
}

function evalGroupRoundDay(d,members,destLL,nights){
  var d2=addDays(d,nights),bOut=dayBoard(d),bBack=dayBoard(d2),per=[];
  members.forEach(function(m){
    var bLL=tripLatLng(m.base);
    var go=legEval(d,bOut,bLL,destLL,m.cd.yojin);
    var back=legEval(d2,bBack,destLL,bLL,m.cd.yojin);
    var gs=go.isBad?0:go.stars,bs=back.isBad?0:back.stars;
    per.push({id:m.id,name:m.name,go:go,back:back,gs:gs,bs:bs,bothGood:!go.isBad&&go.stars>=3&&!back.isBad&&back.stars>=3,isBad:go.isBad||back.isBad,odir:go.dir,rdir:back.dir,base:m.base});
  });
  if(APP.chartData){extractDirections(bOut,APP.chartData.yojin);extractDirections(bBack,APP.chartData.yojin);}
  var allGood=per.every(function(x){return x.bothGood;}),anyBad=per.some(function(x){return x.isBad;});
  var avg=per.reduce(function(a,b){return a+(b.gs+b.bs)/2;},0)/per.length;
  var stars;if(anyBad)stars=1;else if(allGood)stars=Math.max(3,Math.round(avg));else stars=Math.max(2,Math.round(avg));if(stars>5)stars=5;

  var rank=avg-(anyBad?3:0)+(allGood?1:0);
  return {date:d,ret:d2,nights:nights,per:per,allGood:allGood,anyBad:anyBad,stars:stars,label:label,rank:rank};
}

/* ===== コンパス描画（自宅基準の方角を表示）===== */
function drawCompass(){
  var stage=document.getElementById('compass');if(!stage||!APP._compass)return;
  var TARGET=APP._compass.best,WORST=APP._compass.worst,heading=APP.heading;
  var cx=120,cy=120,r=92;
  function sp(absDeg,rad){var a=(absDeg-heading-90)*Math.PI/180;return [cx+rad*Math.cos(a),cy+rad*Math.sin(a)];}
  var s='<svg viewBox="0 0 240 240" width="220" height="220" xmlns="http://www.w3.org/2000/svg">';
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="var(--surface)" stroke="var(--line)" stroke-width="1"/>';
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(r*0.62)+'" fill="none" stroke="var(--line)" stroke-width="0.5" stroke-dasharray="3 3"/>';
  if(WORST!=null){var z1=sp(WORST-22,r),z2=sp(WORST+22,r);s+='<path d="M '+cx+' '+cy+' L '+z1[0]+' '+z1[1]+' A '+r+' '+r+' 0 0 1 '+z2[0]+' '+z2[1]+' Z" fill="rgba(192,67,47,0.22)" stroke="#c0432f" stroke-width="1" stroke-dasharray="4 3"/>';}
  var labels=[['北',0],['北東',45],['東',90],['南東',135],['南',180],['南西',225],['西',270],['北西',315]];
  labels.forEach(function(L){var p=sp(L[1],r+13);var isN=L[1]===0,isT=(TARGET!=null&&L[1]===TARGET),isW=(WORST!=null&&L[1]===WORST);var col=isT?'#82c9a8':isW?'#df7a66':isN?'#df7a66':'var(--text2)';var w=(isT||isW||isN)?'700':'400';s+='<text x="'+p[0]+'" y="'+(p[1]+4)+'" text-anchor="middle" font-size="11" font-weight="'+w+'" fill="'+col+'">'+L[0]+'</text>';});
  for(var i=0;i<72;i++){var p1=sp(i*5,r),p2=sp(i*5,r-(i%2===0?7:4));s+='<line x1="'+p1[0]+'" y1="'+p1[1]+'" x2="'+p2[0]+'" y2="'+p2[1]+'" stroke="var(--line)" stroke-width="0.5"/>';}
  if(WORST!=null){var wp=sp(WORST,r*0.72);s+='<circle cx="'+wp[0]+'" cy="'+wp[1]+'" r="10" fill="rgba(192,67,47,0.18)" stroke="#c0432f" stroke-width="2"/><line x1="'+(wp[0]-4.5)+'" y1="'+(wp[1]-4.5)+'" x2="'+(wp[0]+4.5)+'" y2="'+(wp[1]+4.5)+'" stroke="#d96a55" stroke-width="2"/>';}
  if(TARGET!=null){var tp=sp(TARGET,r*0.74);s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+tp[0]+'" y2="'+tp[1]+'" stroke="#4a9d7f" stroke-width="3"/><circle cx="'+tp[0]+'" cy="'+tp[1]+'" r="9" fill="#4a9d7f"/><text x="'+tp[0]+'" y="'+(tp[1]+3.5)+'" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">吉</text>';}
  s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+cx+'" y2="'+(cy-r*0.5)+'" stroke="#185fa5" stroke-width="2" stroke-dasharray="3 2" opacity="0.5"/><circle cx="'+cx+'" cy="'+cy+'" r="6" fill="#185fa5"/>';
  s+='</svg>';
  stage.innerHTML=s;
  // ステータス
  var sl=document.getElementById('statusLine');if(!sl)return;
  if(WORST!=null){var dW=((WORST-heading)%360+360)%360;if(dW<=22||dW>=338){sl.className='status-line status-danger';sl.innerHTML='⚠ 正面は凶方位（'+dirName(WORST)+'）です。この方角への移動は控えめに';return;}}
  if(TARGET!=null){var dT=((TARGET-heading)%360+360)%360;if(dT<=10||dT>=350){sl.className='status-line status-aligned';sl.innerHTML='✅ 正面が吉方位です！この向きにまっすぐ進んでください';return;}var turn=dT<=180?'右':'左',amt=dT<=180?dT:360-dT;sl.className='status-line status-turn';sl.innerHTML='体を <b>'+turn+'へ約'+Math.round(amt)+'°</b> 回すと正面が吉方位になります';return;}
  sl.className='status-line status-turn';sl.innerHTML='本日は際立った吉方位がありません';
}
function dirName(deg){var m={0:'北',45:'北東',90:'東',135:'南東',180:'南',225:'南西',270:'西',315:'北西'};return m[deg]||deg+'°';}

function natalCatMod(cd,key){
  var g=cd.dGogyo,sc=cd.score||{},total=cd.total||1,avg=total/5,k;
  if(key==='health'){var dev=0;for(k in sc)dev+=Math.abs(sc[k]-avg);dev=dev/(total||1);return Math.round((0.45-dev)*16);}

  if(!elem)return 0;

}
